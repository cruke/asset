<body>

<header>
QR & Barcode Scanner
</header>

<div id="reader"></div>

<div class="controls">

    <select id="cameraSelect"></select>

    <div class="buttons">

        <button onclick="startScanner()">
        Start
        </button>

        <button onclick="stopScanner()">
        Stop
        </button>

        <button onclick="toggleTorch()">
        Torch
        </button>

        <button onclick="toggleMirror()">
        Mirror
        </button>

    </div>

</div>

<div class="status"
id="status">

Waiting...

</div>

<div id="history">

<b>Scan History</b>

<div id="historyList"></div>

</div>

<div id="popup"></div>

<script>

/* ---------- GOOGLE SHEETS ---------- */

const GAS_URL =
"https://script.google.com/macros/s/AKfycbyUEjurhn07mG8zmal7W9HUwiCer_RABw503xgpR3WDSZs8SxxsssLs2roG0x96T-G5fQ/exec";

/* ---------- VARIABLES ---------- */

let html5QrCode;

let currentCameraId="";

let torch=false;

let mirror=false;

/* anti spam */

let scanLock=false;

let lastText="";

/* ---------- LOAD CAMERAS ---------- */

async function loadCameras(){

    const devices =
    await Html5Qrcode
    .getCameras();

    const select =
    document
    .getElementById(
    "cameraSelect"
    );

    select.innerHTML="";

    devices.forEach((device,index)=>{

        const option =
        document
        .createElement(
        "option"
        );

        option.value =
        device.id;

        option.text =
        device.label ||
        "Camera "+(index+1);

        select.appendChild(
        option
        );
    });

    // auto select back camera

    const backCam =
    devices.find(d=>
    d.label
    .toLowerCase()
    .includes("back")
    );

    if(backCam){

        select.value =
        backCam.id;
    }

    currentCameraId =
    select.value;
}

/* ---------- START ---------- */

async function startScanner(){

    await stopScanner();

    currentCameraId =
    document
    .getElementById(
    "cameraSelect"
    ).value;

    html5QrCode =
    new Html5Qrcode(
    "reader"
    );

    try{

        await html5QrCode.start(

            currentCameraId,

            {
                fps:10,

                qrbox:{
                    width:250,
                    height:250
                }
            },

            async(decodedText)=>{

                /* ---------- PREVENT SPAM ---------- */

                if(
                    scanLock &&
                    decodedText === lastText
                ){
                    return;
                }

                scanLock = true;

                lastText = decodedText;

                /* ---------- UI ---------- */

                showPopup(
                decodedText
                );

                addHistory(
                decodedText
                );

                beep();

                if(
                navigator.vibrate
                ){
                    navigator.vibrate(
                    [120,50,120]
                    );
                }

                /* ---------- SAVE ---------- */

                await sendToSheet(
                decodedText
                );

                /* ---------- UNLOCK ---------- */

                setTimeout(()=>{

                    scanLock = false;

                },3000);
            }
        );

        document
        .getElementById(
        "status"
        ).innerHTML=
        "Scanner Started";

    }catch(err){

        alert(err);
    }
}

/* ---------- STOP ---------- */

async function stopScanner(){

    try{

        if(html5QrCode){

            await html5QrCode
            .stop();

            await html5QrCode
            .clear();
        }

    }catch(e){}
}

/* ---------- TORCH ---------- */

async function toggleTorch(){

    try{

        torch=!torch;

        await html5QrCode
        .applyVideoConstraints({

            advanced:[{
                torch:torch
            }]
        });

        showPopup(
        torch
        ? "Torch ON"
        : "Torch OFF"
        );

    }catch(err){

        alert(
        "Torch not supported"
        );
    }
}

/* ---------- MIRROR ---------- */

function toggleMirror(){

    mirror=!mirror;

    const video =
    document.querySelector(
    "#reader video"
    );

    if(video){

        if(mirror){

            video.style.transform=
            "scaleX(-1)";

        }else{

            video.style.transform=
            "scaleX(1)";
        }
    }

    showPopup(
    mirror
    ? "Mirror ON"
    : "Mirror OFF"
    );
}

/* ---------- BEEP ---------- */

function beep(){

    const audioCtx=
    new(window.AudioContext||
    window.webkitAudioContext)();

    const osc=
    audioCtx.createOscillator();

    const gain=
    audioCtx.createGain();

    osc.connect(gain);

    gain.connect(
        audioCtx.destination
    );

    osc.frequency.value=1200;

    gain.gain.value=0.2;

    osc.start();

    setTimeout(()=>{

        osc.stop();

        audioCtx.close();

    },120);
}

/* ---------- POPUP ---------- */

function showPopup(text){

    const popup =
    document
    .getElementById(
    "popup"
    );

    popup.innerHTML=text;

    popup.style.display=
    "block";

    clearTimeout(
    popup.timer
    );

    popup.timer=
    setTimeout(()=>{

        popup.style.display=
        "none";

    },3000);
}

/* ---------- HISTORY ---------- */

function addHistory(text){

    const div =
    document
    .createElement(
    "div"
    );

    div.className=
    "historyItem";

    div.innerHTML=
    "<b>"+
    new Date()
    .toLocaleTimeString()+
    "</b><br>"+text;

    document
    .getElementById(
    "historyList"
    )
    .prepend(div);
}

/* ---------- GOOGLE SHEETS ---------- */

async function sendToSheet(code){

    try{

        document
        .getElementById(
        "status"
        ).innerHTML=
        "Saving...";

        await fetch(
        GAS_URL,
        {

            method:"POST",

            headers:{
                "Content-Type":
                "text/plain"
            },

            body:JSON.stringify({

                id:code,

                time:new Date()
                .toLocaleString()

            })
        });

        document
        .getElementById(
        "status"
        ).innerHTML=
        "Saved";

    }catch(err){

        document
        .getElementById(
        "status"
        ).innerHTML=
        "Network Error";
    }
}

/* ---------- INIT ---------- */

loadCameras();

</script>

</body>
</html>
