<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>Professional Asset QR & Barcode Scanner</title>

<style>

:root{
    --bg:#0f172a;
    --card:#111827;
    --fg:#e2e8f0;
    --accent:#22d3ee;
    --green:#22c55e;
    --red:#ef4444;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:var(--bg);
    color:var(--fg);
    font-family:Arial,sans-serif;
}

header{
    text-align:center;
    padding:14px;
    font-size:22px;
    font-weight:bold;
    color:var(--accent);
    background:#111827;
    border-bottom:2px solid var(--accent);
}

/* ---------- CONTROLS ---------- */

.controls{
    padding:12px;
}

select{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:var(--card);
    color:white;
    font-size:16px;
    margin-bottom:10px;
}

.buttons{
    display:grid;
    grid-template-columns:
    repeat(2,1fr);
    gap:10px;
}

button{
    padding:14px;
    border:none;
    border-radius:12px;
    background:var(--card);
    color:white;
    font-size:16px;
}

button:active{
    transform:scale(0.97);
}

/* ---------- CAMERA ---------- */

#cameraWrap{
    position:relative;
    width:100%;
    height:50vh;
    overflow:hidden;
    background:black;
}

#video{
    display:none;
}

#display{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
    background:black;
}

#overlay{
    position:absolute;
    inset:0;
    pointer-events:none;
}

/* ---------- HYBRID ROI ---------- */

#roi{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    width:320px;
    height:320px;
    border:2px solid rgba(255,255,255,0.15);
    border-radius:20px;
    pointer-events:none;
}

/* corners */

#roi::before{
    content:"";
    position:absolute;
    top:-3px;
    left:-3px;
    width:60px;
    height:60px;
    border-top:5px solid var(--green);
    border-left:5px solid var(--green);
    border-top-left-radius:20px;
}

#roi::after{
    content:"";
    position:absolute;
    right:-3px;
    bottom:-3px;
    width:60px;
    height:60px;
    border-right:5px solid var(--green);
    border-bottom:5px solid var(--green);
    border-bottom-right-radius:20px;
}

.corner1{
    position:absolute;
    top:-3px;
    right:-3px;
    width:60px;
    height:60px;
    border-top:5px solid var(--green);
    border-right:5px solid var(--green);
    border-top-right-radius:20px;
}

.corner2{
    position:absolute;
    left:-3px;
    bottom:-3px;
    width:60px;
    height:60px;
    border-left:5px solid var(--green);
    border-bottom:5px solid var(--green);
    border-bottom-left-radius:20px;
}

/* ---------- SCAN LINE ---------- */

#scanline{
    position:absolute;
    left:50%;
    top:50%;
    transform:translateX(-50%);
    width:300px;
    height:3px;
    background:var(--green);
    box-shadow:0 0 12px var(--green);
    animation:scan 1.8s linear infinite;
}

@keyframes scan{

    0%{
        margin-top:-140px;
    }

    50%{
        margin-top:140px;
    }

    100%{
        margin-top:-140px;
    }
}

/* ---------- STATUS ---------- */

.status{
    text-align:center;
    padding:10px;
    color:var(--green);
    font-size:16px;
}

/* ---------- RESULT ---------- */

#resultBox{
    margin:12px;
    background:var(--card);
    border-radius:14px;
    padding:14px;
    display:none;
}

.resultTitle{
    color:var(--accent);
    font-size:18px;
    font-weight:bold;
    margin-bottom:10px;
}

.resultItem{
    margin-bottom:12px;
}

.resultLabel{
    color:#94a3b8;
    font-size:13px;
}

.resultValue{
    margin-top:4px;
    font-size:17px;
    word-break:break-word;
}

/* ---------- HISTORY ---------- */

#history{
    padding:12px;
}

.historyTitle{
    color:var(--accent);
    font-size:18px;
    margin-bottom:10px;
    font-weight:bold;
}

.historyItem{
    background:var(--card);
    border-left:4px solid var(--green);
    border-radius:12px;
    padding:12px;
    margin-bottom:10px;
    word-break:break-word;
}

.notFound{
    color:var(--red);
}

/* ---------- POPUP ---------- */

#popup{
    position:fixed;
    left:50%;
    bottom:20px;
    transform:translateX(-50%);
    width:90%;
    max-width:400px;
    background:rgba(0,0,0,0.9);
    border:2px solid var(--green);
    border-radius:14px;
    padding:14px;
    color:var(--green);
    text-align:center;
    display:none;
    z-index:9999;
}

</style>

</head>

<body>

<header>
Professional Asset QR & Barcode Scanner
</header>

<!-- CONTROLS -->

<div class="controls">

    <select id="cameraSelect"></select>

    <div class="buttons">

        <button id="startBtn">
        Start
        </button>

        <button id="stopBtn">
        Stop
        </button>

        <button id="torchBtn">
        Torch
        </button>

        <button id="mirrorBtn">
        Mirror
        </button>

    </div>

</div>

<!-- CAMERA -->

<div id="cameraWrap">

    <video id="video"
    playsinline></video>

    <canvas id="display"></canvas>

    <canvas id="overlay"></canvas>

    <div id="roi">

        <div class="corner1"></div>

        <div class="corner2"></div>

    </div>

    <div id="scanline"></div>

</div>

<!-- STATUS -->

<div class="status"
id="status">

Waiting...

</div>

<!-- RESULT -->

<div id="resultBox">

    <div class="resultTitle">
    Asset Information
    </div>

    <div class="resultItem">

        <div class="resultLabel">
        NO SIRI PENDAFTARAN
        </div>

        <div class="resultValue"
        id="resultSiri">
        -
        </div>

    </div>

    <div class="resultItem">

        <div class="resultLabel">
        KETERANGAN ASET
        </div>

        <div class="resultValue"
        id="resultAset">
        -
        </div>

    </div>

    <div class="resultItem">

        <div class="resultLabel">
        LOKASI SEMASA
        </div>

        <div class="resultValue"
        id="resultLokasi">
        -
        </div>

    </div>

</div>

<!-- HISTORY -->

<div id="history">

    <div class="historyTitle">
    Scan History
    </div>

    <div id="historyList"></div>

</div>

<!-- POPUP -->

<div id="popup"></div>

<script type="module">

import {
BrowserMultiFormatReader
}
from
"https://cdn.jsdelivr.net/npm/@zxing/library@0.20.0/+esm";

/* ---------- CONFIG ---------- */

const GAS_URL =
"https://script.google.com/macros/s/AKfycbyUEjurhn07mG8zmal7W9HUwiCer_RABw503xgpR3WDSZs8SxxsssLs2roG0x96T-G5fQ/exec";

/* ---------- DOM ---------- */

const video =
document.getElementById(
"video"
);

const display =
document.getElementById(
"display"
);

const overlay =
document.getElementById(
"overlay"
);

const dctx =
display.getContext(
"2d"
);

const octx =
overlay.getContext(
"2d"
);

const cameraSelect =
document.getElementById(
"cameraSelect"
);

/* ---------- ZXING ---------- */

const codeReader =
new BrowserMultiFormatReader();

/* ---------- STATE ---------- */

let stream=null;

let track=null;

let running=false;

let mirror=false;

let torch=false;

let lastText="";
let lastScanTime=0;

/* ---------- DECODE CANVAS ---------- */

const decodeCanvas =
document.createElement(
"canvas"
);

const decodeCtx =
decodeCanvas.getContext(
"2d",
{
willReadFrequently:true
}
);

/* ---------- LOAD CAMERAS ---------- */

async function loadCameras(){

    const temp =
    await navigator
    .mediaDevices
    .getUserMedia({
        video:true
    });

    temp.getTracks()
    .forEach(t=>t.stop());

    const devices =
    await navigator
    .mediaDevices
    .enumerateDevices();

    const cams =
    devices.filter(d=>
    d.kind==="videoinput"
    );

    cameraSelect.innerHTML="";

    cams.forEach((cam,index)=>{

        const option =
        document
        .createElement(
        "option"
        );

        option.value =
        cam.deviceId;

        option.textContent =
        cam.label ||
        "Camera "+(index+1);

        cameraSelect
        .appendChild(
        option
        );
    });

    const backCam =
    cams.find(c=>
    c.label
    .toLowerCase()
    .includes("back")
    );

    if(backCam){

        cameraSelect.value =
        backCam.deviceId;
    }
}

/* ---------- START ---------- */

async function startScanner(){

    stopScanner();

    try{

        stream =
        await navigator
        .mediaDevices
        .getUserMedia({

            video:{
                deviceId:{
                    exact:
                    cameraSelect.value
                },
                facingMode:"environment"
            }
        });

        video.srcObject=
        stream;

        await video.play();

        track =
        stream
        .getVideoTracks()[0];

        display.width =
        cameraWrap.clientWidth;

        display.height =
        cameraWrap.clientHeight;

        overlay.width =
        cameraWrap.clientWidth;

        overlay.height =
        cameraWrap.clientHeight;

        running=true;

        renderLoop();

        decodeLoop();

        status(
        "Scanner Started"
        );

    }catch(err){

        alert(err);
    }
}

/* ---------- STOP ---------- */

function stopScanner(){

    running=false;

    try{
        codeReader.reset();
    }catch(e){}

    if(stream){

        stream
        .getTracks()
        .forEach(t=>t.stop());

        stream=null;
    }
}

/* ---------- RENDER ---------- */

function renderLoop(){

    if(!running){
        return;
    }

    requestAnimationFrame(
    renderLoop
    );

    const cw =
    display.width;

    const ch =
    display.height;

    const vw =
    video.videoWidth;

    const vh =
    video.videoHeight;

    if(!vw || !vh){
        return;
    }

    const scale =
    Math.max(
        cw/vw,
        ch/vh
    );

    const sw =
    cw/scale;

    const sh =
    ch/scale;

    const sx =
    (vw-sw)/2;

    const sy =
    (vh-sh)/2;

    dctx.save();

    if(mirror){

        dctx.translate(cw,0);

        dctx.scale(-1,1);
    }

    dctx.drawImage(

        video,

        sx,
        sy,
        sw,
        sh,

        0,
        0,
        cw,
        ch
    );

    dctx.restore();
}

/* ---------- DECODE LOOP ---------- */

async function decodeLoop(){

    if(!running){
        return;
    }

    requestAnimationFrame(
    decodeLoop
    );

    const cw =
    display.width;

    const ch =
    display.height;

    // hybrid QR + barcode ROI

    const rw = 320;
    const rh = 320;

    const rx =
    (cw-rw)/2;

    const ry =
    (ch-rh)/2;

    decodeCanvas.width=rw;
    decodeCanvas.height=rh;

    decodeCtx.drawImage(

        display,

        rx,
        ry,
        rw,
        rh,

        0,
        0,
        rw,
        rh
    );

    try{

        const result =
        await codeReader
        .decodeFromCanvas(
        decodeCanvas
        );

        if(result){

            handleResult(
            result.text
            );
        }

    }catch(e){}
}

/* ---------- HANDLE RESULT ---------- */

async function handleResult(text){

    const now =
    Date.now();

    if(
        text===lastText &&
        (now-lastScanTime)
        < 3000
    ){
        return;
    }

    lastText=text;

    lastScanTime=now;

    beep();

    if(
    navigator.vibrate
    ){
        navigator.vibrate(
        [120,50,120]
        );
    }

    await searchAsset(
    text
    );
}

/* ---------- DATABASE ---------- */

async function searchAsset(code){

    try{

        status(
        "Searching Database..."
        );

        const response =
        await fetch(
        GAS_URL,
        {

            method:"POST",

            headers:{
                "Content-Type":
                "text/plain"
            },

            body:JSON.stringify({
                id:code
            })
        });

        const data =
        await response.json();

        if(data.found){

            status(
            "Asset Found"
            );

            resultBox.style.display=
            "block";

            resultSiri.innerHTML =
            data.no_siri;

            resultAset.innerHTML =
            data.keterangan;

            resultLokasi.innerHTML =
            data.lokasi;

            addHistory(
                code,
                data.no_siri,
                data.keterangan,
                data.lokasi,
                true
            );

            showPopup(
            "Asset Found"
            );

        }else{

            status(
            "Asset Not Found"
            );

            resultBox.style.display=
            "none";

            addHistory(
                code,
                "",
                "",
                "",
                false
            );

            showPopup(
            "Asset Not Found"
            );
        }

    }catch(err){

        console.log(err);

        status(
        "Network Error"
        );

        showPopup(
        "Network Error"
        );
    }
}

/* ---------- HISTORY ---------- */

function addHistory(
qr,
siri,
aset,
lokasi,
found
){

    const div =
    document
    .createElement(
    "div"
    );

    div.className=
    "historyItem";

    let html =
    "<b>"+
    new Date()
    .toLocaleString()+
    "</b><br><br>";

    html +=
    "<b>QR:</b><br>"+
    qr+
    "<br><br>";

    if(found){

        html +=
        "<b>NO SIRI:</b><br>"+
        siri+
        "<br><br>";

        html +=
        "<b>ASET:</b><br>"+
        aset+
        "<br><br>";

        html +=
        "<b>LOKASI:</b><br>"+
        lokasi;

    }else{

        html +=
        "<span class='notFound'>Asset Not Found</span>";
    }

    div.innerHTML=html;

    historyList.prepend(
    div
    );
}

/* ---------- TORCH ---------- */

async function toggleTorch(){

    if(!track){
        return;
    }

    const caps =
    track.getCapabilities();

    if(!caps.torch){

        alert(
        "Torch not supported"
        );

        return;
    }

    torch=!torch;

    await track
    .applyConstraints({

        advanced:[{
            torch:torch
        }]
    });

    showPopup(
    torch
    ? "Torch ON"
    : "Torch OFF"
    );
}

/* ---------- MIRROR ---------- */

function toggleMirror(){

    mirror=!mirror;

    showPopup(
    mirror
    ? "Mirror ON"
    : "Mirror OFF"
    );
}

/* ---------- STATUS ---------- */

function status(t){

    document
    .getElementById(
    "status"
    ).innerHTML=t;
}

/* ---------- BEEP ---------- */

function beep(){

    const audioCtx =
    new(window.AudioContext||
    window.webkitAudioContext)();

    const osc =
    audioCtx.createOscillator();

    const gain =
    audioCtx.createGain();

    osc.connect(gain);

    gain.connect(
        audioCtx.destination
    );

    osc.frequency.value=1200;

    gain.gain.value=0.2;

    osc.start();

    setTimeout(()=>{

        osc.stop();

        audioCtx.close();

    },120);
}

/* ---------- POPUP ---------- */

function showPopup(text){

    const popup =
    document
    .getElementById(
    "popup"
    );

    popup.innerHTML=text;

    popup.style.display=
    "block";

    clearTimeout(
    popup.timer
    );

    popup.timer=
    setTimeout(()=>{

        popup.style.display=
        "none";

    },2500);
}

/* ---------- EVENTS ---------- */

startBtn.onclick =
startScanner;

stopBtn.onclick =
stopScanner;

torchBtn.onclick =
toggleTorch;

mirrorBtn.onclick =
toggleMirror;

/* ---------- INIT ---------- */

loadCameras();

</script>

</body>
</html>
