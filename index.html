```html
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>Mobile QR & Barcode Scanner</title>

<style>

:root{
    --bg:#0f172a;
    --fg:#e2e8f0;
    --accent:#22d3ee;
    --green:#22c55e;
}

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    margin:0;
    background:var(--bg);
    color:var(--fg);
    font-family:Arial,sans-serif;
    overflow-x:hidden;
}

header{
    text-align:center;
    padding:12px;
    font-size:20px;
    font-weight:bold;
    color:var(--accent);
}

#frameWrap{
    position:relative;
    width:100vw;
    height:58vh;
    background:black;
    overflow:hidden;
}

#video{
    display:none;
}

#view{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

#overlay{
    position:absolute;
    left:0;
    top:0;
    width:100%;
    height:100%;
    pointer-events:none;
}

/* ROI */

#roi{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    width:65vw;
    max-width:280px;
    aspect-ratio:1;
    border:3px solid #22c55e;
    border-radius:20px;
    box-shadow:
    0 0 15px #22c55e;
}

/* scan line */

#scanline{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    width:65vw;
    max-width:280px;
    height:3px;
    background:#22c55e;
    box-shadow:0 0 10px #22c55e;
    animation:scan 2s linear infinite;
}

@keyframes scan{
    0%{
        top:calc(50% - 120px);
    }
    50%{
        top:calc(50% + 120px);
    }
    100%{
        top:calc(50% - 120px);
    }
}

/* popup */

#popup{
    position:absolute;
    left:50%;
    bottom:18px;
    transform:translateX(-50%);
    background:rgba(0,0,0,0.85);
    color:#22c55e;
    padding:12px 16px;
    border-radius:12px;
    border:2px solid #22c55e;
    width:90%;
    max-width:400px;
    text-align:center;
    font-size:15px;
    word-wrap:break-word;
    display:none;
}

/* controls */

.controls{
    padding:12px;
}

select{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:none;
    background:#111827;
    color:white;
    font-size:16px;
    margin-bottom:10px;
}

.buttons{
    display:grid;
    grid-template-columns:
    repeat(2,1fr);
    gap:10px;
}

button{
    padding:14px;
    border:none;
    border-radius:12px;
    background:#111827;
    color:white;
    font-size:16px;
}

button:active{
    transform:scale(0.97);
}

#history{
    padding:12px;
}

.historyItem{
    background:#111827;
    margin-bottom:8px;
    padding:10px;
    border-radius:10px;
    font-size:14px;
    word-break:break-word;
}

</style>

<script type="module">

import {
BrowserMultiFormatReader
}
from
"https://cdn.jsdelivr.net/npm/@zxing/library@0.20.0/+esm";

window.reader =
new BrowserMultiFormatReader();

</script>

</head>

<body>

<header>
QR & Barcode Scanner
</header>

<div id="frameWrap">

    <video id="video"
    playsinline></video>

    <canvas id="view"></canvas>

    <canvas id="overlay"></canvas>

    <div id="roi"></div>

    <div id="scanline"></div>

    <div id="popup"></div>

</div>

<div class="controls">

    <select id="cameraSelect"></select>

    <div class="buttons">

        <button id="startBtn">
        Start
        </button>

        <button id="stopBtn">
        Stop
        </button>

        <button id="torchBtn">
        Torch
        </button>

        <button id="mirrorBtn">
        Mirror
        </button>

    </div>

</div>

<div id="history">

<b>Scan History</b>

<div id="historyList"></div>

</div>

<script type="module">

const video=
document.getElementById("video");

const view=
document.getElementById("view");

const overlay=
document.getElementById("overlay");

const vctx=
view.getContext("2d");

const ctx=
overlay.getContext("2d");

const popup=
document.getElementById("popup");

const cameraSelect=
document.getElementById("cameraSelect");

const codeReader=
window.reader;

let stream=null;
let track=null;

let mirror=false;
let torch=false;

let renderRun=false;

let lastText="";

/* ---------- SOUND ---------- */

function beep(){

    const audioCtx=
    new(window.AudioContext||
    window.webkitAudioContext)();

    const osc=
    audioCtx.createOscillator();

    const gain=
    audioCtx.createGain();

    osc.connect(gain);

    gain.connect(
        audioCtx.destination
    );

    osc.frequency.value=1200;

    gain.gain.value=0.2;

    osc.start();

    setTimeout(()=>{

        osc.stop();

        audioCtx.close();

    },120);
}

/* ---------- POPUP ---------- */

function showPopup(text){

    popup.innerHTML=text;

    popup.style.display="block";

    clearTimeout(
        popup.timer
    );

    popup.timer=
    setTimeout(()=>{

        popup.style.display="none";

    },3000);
}

/* ---------- HISTORY ---------- */

function addHistory(text){

    const div=
    document.createElement("div");

    div.className=
    "historyItem";

    div.innerHTML=
    "<b>"+
    new Date()
    .toLocaleTimeString()+
    "</b><br>"+text;

    document
    .getElementById(
    "historyList"
    )
    .prepend(div);
}

/* ---------- LOAD CAMERAS ---------- */

async function loadCameras(){

    try{

        // ask permission FIRST
        const temp=
        await navigator
        .mediaDevices
        .getUserMedia({
            video:true
        });

        temp.getTracks()
        .forEach(t=>t.stop());

        const devices=
        await navigator
        .mediaDevices
        .enumerateDevices();

        const cams=
        devices.filter(d=>
        d.kind==="videoinput"
        );

        cameraSelect.innerHTML="";

        cams.forEach((cam,index)=>{

            const option=
            document.createElement(
            "option"
            );

            option.value=
            cam.deviceId;

            option.textContent=
            cam.label ||
            "Camera "+
            (index+1);

            cameraSelect
            .appendChild(
            option
            );
        });

        // auto choose back camera

        const backCam=
        cams.find(c=>
        c.label
        .toLowerCase()
        .includes("back")
        );

        if(backCam){

            cameraSelect.value=
            backCam.deviceId;
        }

    }catch(err){

        alert(
        "Camera Permission Needed"
        );
    }
}

/* ---------- START ---------- */

async function startScanner(){

    stopScanner();

    try{

        const selectedCamera=
        cameraSelect.value;

        stream=
        await navigator
        .mediaDevices
        .getUserMedia({

            video:{

                deviceId:
                selectedCamera
                ? {
                    exact:
                    selectedCamera
                  }
                : undefined,

                facingMode:
                "environment"
            }
        });

        video.srcObject=stream;

        await video.play();

        track=
        stream.getVideoTracks()[0];

        view.width=
        video.videoWidth;

        view.height=
        video.videoHeight;

        overlay.width=
        view.width;

        overlay.height=
        view.height;

        renderLoop();

        codeReader
        .decodeFromVideoDevice(
        undefined,
        video,
        (result)=>{

            if(result){

                const text=
                result.text;

                if(
                text===lastText
                ){
                    return;
                }

                lastText=text;

                drawBox(
                result.resultPoints
                );

                showPopup(text);

                addHistory(text);

                beep();

                if(
                navigator.vibrate
                ){
                    navigator.vibrate(
                    [120,50,120]
                    );
                }

                navigator
                .clipboard
                .writeText(text);

                setTimeout(()=>{
                    lastText="";
                },2000);
            }
        });

    }catch(err){

        alert(
        "Start Error:\n"+err
        );
    }
}

/* ---------- STOP ---------- */

function stopScanner(){

    try{
        codeReader.reset();
    }catch(e){}

    if(stream){

        stream
        .getTracks()
        .forEach(t=>t.stop());

        stream=null;
    }

    renderRun=false;
}

/* ---------- RENDER ---------- */

function renderLoop(){

    renderRun=true;

    function loop(){

        if(!renderRun){
            return;
        }

        requestAnimationFrame(loop);

        if(mirror){

            vctx.save();

            vctx.translate(
            view.width,
            0
            );

            vctx.scale(-1,1);

            vctx.drawImage(
                video,
                0,
                0,
                view.width,
                view.height
            );

            vctx.restore();

        }else{

            vctx.drawImage(
                video,
                0,
                0,
                view.width,
                view.height
            );
        }
    }

    loop();
}

/* ---------- DRAW BOX ---------- */

function drawBox(points){

    ctx.clearRect(
        0,
        0,
        overlay.width,
        overlay.height
    );

    if(!points){
        return;
    }

    ctx.strokeStyle=
    "#22c55e";

    ctx.lineWidth=5;

    ctx.beginPath();

    points.forEach((p,i)=>{

        let x=p.x;
        let y=p.y;

        if(mirror){
            x=overlay.width-x;
        }

        if(i===0){
            ctx.moveTo(x,y);
        }else{
            ctx.lineTo(x,y);
        }
    });

    ctx.closePath();

    ctx.stroke();

    setTimeout(()=>{

        ctx.clearRect(
            0,
            0,
            overlay.width,
            overlay.height
        );

    },500);
}

/* ---------- TORCH ---------- */

async function toggleTorch(){

    if(!track){
        return;
    }

    const caps=
    track.getCapabilities();

    if(!caps.torch){

        alert(
        "Torch not supported"
        );

        return;
    }

    torch=!torch;

    await track.applyConstraints({
        advanced:[{
            torch:torch
        }]
    });
}

/* ---------- MIRROR ---------- */

function toggleMirror(){

    mirror=!mirror;

    showPopup(
    mirror
    ? "Mirror ON"
    : "Mirror OFF"
    );
}

/* ---------- EVENTS ---------- */

document
.getElementById(
"startBtn"
)
.onclick=startScanner;

document
.getElementById(
"stopBtn"
)
.onclick=stopScanner;

document
.getElementById(
"torchBtn"
)
.onclick=toggleTorch;

document
.getElementById(
"mirrorBtn"
)
.onclick=toggleMirror;

/* ---------- INIT ---------- */

loadCameras();

</script>

</body>
</html>
