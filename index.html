<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>Asset QR Scanner</title>

<style>

body{
    margin:0;
    background:#0f172a;
    color:white;
    font-family:Arial,sans-serif;
    overflow-x:hidden;
}

header{
    text-align:center;
    padding:14px;
    font-size:22px;
    font-weight:bold;
    color:#22d3ee;
}

/* ---------- CAMERA ---------- */

#cameraContainer{
    position:relative;
    width:100%;
    height:50vh;
    overflow:hidden;
    background:black;
}

#reader{
    width:100%;
    height:100%;
}

#reader video{
    width:100% !important;
    height:100% !important;
    object-fit:cover !important;
}

/* hide default overlay */

#reader__scan_region img{
    display:none !important;
}

#reader__dashboard{
    display:none !important;
}

/* ---------- CUSTOM OVERLAY ---------- */

#customOverlay{
    position:absolute;
    inset:0;
    z-index:999;
    pointer-events:none;
}

/* ---------- VIEWFINDER ---------- */

#roi{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    width:260px;
    height:260px;
    border:2px solid rgba(255,255,255,0.15);
    border-radius:20px;
}

/* top left */

#roi::before{
    content:"";
    position:absolute;
    top:-3px;
    left:-3px;
    width:60px;
    height:60px;
    border-top:5px solid #22c55e;
    border-left:5px solid #22c55e;
    border-top-left-radius:20px;
}

/* bottom right */

#roi::after{
    content:"";
    position:absolute;
    right:-3px;
    bottom:-3px;
    width:60px;
    height:60px;
    border-right:5px solid #22c55e;
    border-bottom:5px solid #22c55e;
    border-bottom-right-radius:20px;
}

/* top right */

.corner1{
    position:absolute;
    top:-3px;
    right:-3px;
    width:60px;
    height:60px;
    border-top:5px solid #22c55e;
    border-right:5px solid #22c55e;
    border-top-right-radius:20px;
}

/* bottom left */

.corner2{
    position:absolute;
    left:-3px;
    bottom:-3px;
    width:60px;
    height:60px;
    border-left:5px solid #22c55e;
    border-bottom:5px solid #22c55e;
    border-bottom-left-radius:20px;
}

/* ---------- SCAN LINE ---------- */

#scanline{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    width:240px;
    height:3px;
    background:#22c55e;
    box-shadow:0 0 10px #22c55e;
    animation:scan 2s linear infinite;
}

@keyframes scan{

    0%{
        top:calc(50% - 120px);
    }

    50%{
        top:calc(50% + 120px);
    }

    100%{
        top:calc(50% - 120px);
    }
}

/* ---------- CONTROLS ---------- */

.controls{
    padding:12px;
}

select{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#111827;
    color:white;
    font-size:16px;
    margin-bottom:10px;
}

.buttons{
    display:grid;
    grid-template-columns:
    repeat(2,1fr);
    gap:10px;
}

button{
    padding:14px;
    border:none;
    border-radius:12px;
    background:#111827;
    color:white;
    font-size:16px;
}

button:active{
    transform:scale(0.97);
}

/* ---------- STATUS ---------- */

.status{
    text-align:center;
    padding:10px;
    color:#22c55e;
    font-size:16px;
}

/* ---------- RESULT ---------- */

#resultBox{
    margin:12px;
    background:#111827;
    border-radius:14px;
    padding:14px;
    display:none;
}

.resultTitle{
    color:#22d3ee;
    margin-bottom:10px;
    font-weight:bold;
    font-size:18px;
}

.resultItem{
    margin-bottom:12px;
    word-break:break-word;
}

.resultLabel{
    color:#94a3b8;
    font-size:13px;
}

.resultValue{
    font-size:17px;
    margin-top:3px;
}

/* ---------- POPUP ---------- */

#popup{
    position:fixed;
    left:50%;
    bottom:20px;
    transform:translateX(-50%);
    width:90%;
    max-width:400px;
    background:rgba(0,0,0,0.9);
    border:2px solid #22c55e;
    border-radius:14px;
    padding:14px;
    color:#22c55e;
    text-align:center;
    word-break:break-word;
    display:none;
    z-index:9999;
}

/* ---------- HISTORY ---------- */

#history{
    padding:12px;
}

.historyItem{
    background:#111827;
    padding:12px;
    margin-bottom:10px;
    border-radius:12px;
    font-size:14px;
    word-break:break-word;
    border-left:4px solid #22c55e;
}

.historyTitle{
    color:#22d3ee;
    font-size:15px;
    margin-bottom:10px;
}

.notFound{
    color:#ef4444;
}

</style>

<script src="https://unpkg.com/html5-qrcode"></script>

</head>

<body>

<header>
Asset QR Scanner
</header>

<!-- CONTROLS -->

<div class="controls">

    <select id="cameraSelect"></select>

    <div class="buttons">

        <button onclick="startScanner()">
        Start
        </button>

        <button onclick="stopScanner()">
        Stop
        </button>

        <button onclick="toggleTorch()">
        Torch
        </button>

        <button onclick="toggleMirror()">
        Mirror
        </button>

    </div>

</div>

<!-- CAMERA -->

<div id="cameraContainer">

    <div id="reader"></div>

    <div id="customOverlay">

        <div id="roi">

            <div class="corner1"></div>

            <div class="corner2"></div>

        </div>

        <div id="scanline"></div>

    </div>

</div>

<!-- STATUS -->

<div class="status"
id="status">

Waiting...

</div>

<!-- RESULT -->

<div id="resultBox">

    <div class="resultTitle">
    Asset Information
    </div>

    <div class="resultItem">

        <div class="resultLabel">
        NO SIRI PENDAFTARAN
        </div>

        <div class="resultValue"
        id="resultSiri">
        -
        </div>

    </div>

    <div class="resultItem">

        <div class="resultLabel">
        KETERANGAN ASET
        </div>

        <div class="resultValue"
        id="resultAset">
        -
        </div>

    </div>

    <div class="resultItem">

        <div class="resultLabel">
        LOKASI SEMASA
        </div>

        <div class="resultValue"
        id="resultLokasi">
        -
        </div>

    </div>

</div>

<!-- HISTORY -->

<div id="history">

<div class="historyTitle">
Scan History
</div>

<div id="historyList"></div>

</div>

<!-- POPUP -->

<div id="popup"></div>

<script>

/* ---------- GOOGLE APPS SCRIPT ---------- */

const GAS_URL =
"https://script.google.com/macros/s/AKfycbyUEjurhn07mG8zmal7W9HUwiCer_RABw503xgpR3WDSZs8SxxsssLs2roG0x96T-G5fQ/exec";

/* ---------- VARIABLES ---------- */

let html5QrCode;

let currentCameraId="";

let torch=false;

let mirror=false;

let lastText="";
let lastScanTime=0;

/* ---------- LOAD CAMERAS ---------- */

async function loadCameras(){

    const devices =
    await Html5Qrcode.getCameras();

    const select =
    document.getElementById(
    "cameraSelect"
    );

    select.innerHTML="";

    devices.forEach((device,index)=>{

        const option =
        document.createElement(
        "option"
        );

        option.value =
        device.id;

        option.text =
        device.label ||
        "Camera "+(index+1);

        select.appendChild(
        option
        );
    });

    const backCam =
    devices.find(d=>
    d.label
    .toLowerCase()
    .includes("back")
    );

    if(backCam){

        select.value =
        backCam.id;
    }

    currentCameraId =
    select.value;
}

/* ---------- START ---------- */

async function startScanner(){

    await stopScanner();

    currentCameraId =
    document.getElementById(
    "cameraSelect"
    ).value;

    html5QrCode =
    new Html5Qrcode(
    "reader"
    );

    try{

        await html5QrCode.start(

            currentCameraId,

            {
                fps:10,

                qrbox:{
                    width:240,
                    height:240
                }
            },

            async(decodedText)=>{

                const now =
                Date.now();

                // prevent repeated scans

                if(
                    decodedText === lastText &&
                    (now - lastScanTime)
                    < 3000
                ){
                    return;
                }

                lastText =
                decodedText;

                lastScanTime =
                now;

                beep();

                if(
                navigator.vibrate
                ){
                    navigator.vibrate(
                    [120,50,120]
                    );
                }

                await searchAsset(
                decodedText
                );
            }
        );

        document.getElementById(
        "status"
        ).innerHTML=
        "Scanner Started";

    }catch(err){

        alert(err);
    }
}

/* ---------- STOP ---------- */

async function stopScanner(){

    try{

        if(html5QrCode){

            await html5QrCode.stop();

            await html5QrCode.clear();
        }

    }catch(e){}
}

/* ---------- SEARCH DATABASE ---------- */

async function searchAsset(code){

    try{

        document.getElementById(
        "status"
        ).innerHTML=
        "Searching Database...";

        const response =
        await fetch(
        GAS_URL,
        {

            method:"POST",

            headers:{
                "Content-Type":
                "text/plain"
            },

            body:JSON.stringify({

                id:code

            })
        });

        const data =
        await response.json();

        console.log(data);

        if(data.found){

            document.getElementById(
            "status"
            ).innerHTML=
            "Asset Found";

            document.getElementById(
            "resultBox"
            ).style.display=
            "block";

            document.getElementById(
            "resultSiri"
            ).innerHTML=
            data.no_siri;

            document.getElementById(
            "resultAset"
            ).innerHTML=
            data.keterangan;

            document.getElementById(
            "resultLokasi"
            ).innerHTML=
            data.lokasi;

            addHistory(
                code,
                data.no_siri,
                data.keterangan,
                data.lokasi,
                true
            );

            showPopup(
            "Asset Found"
            );

        }else{

            document.getElementById(
            "status"
            ).innerHTML=
            "Asset Not Found";

            document.getElementById(
            "resultBox"
            ).style.display=
            "none";

            addHistory(
                code,
                "",
                "",
                "",
                false
            );

            showPopup(
            "Asset Not Found"
            );
        }

    }catch(err){

        console.log(err);

        document.getElementById(
        "status"
        ).innerHTML=
        "Network Error";

        showPopup(
        "Network Error"
        );
    }
}

/* ---------- ADD HISTORY ---------- */

function addHistory(
    qr,
    siri,
    aset,
    lokasi,
    found
){

    const div =
    document.createElement(
    "div"
    );

    div.className=
    "historyItem";

    let html =
    "<b>"+
    new Date()
    .toLocaleString()+
    "</b><br><br>";

    html +=
    "<b>QR:</b><br>"+
    qr+
    "<br><br>";

    if(found){

        html +=
        "<b>NO SIRI:</b><br>"+
        siri+
        "<br><br>";

        html +=
        "<b>ASET:</b><br>"+
        aset+
        "<br><br>";

        html +=
        "<b>LOKASI:</b><br>"+
        lokasi;

    }else{

        html +=
        "<span class='notFound'>Asset Not Found</span>";
    }

    div.innerHTML=html;

    document.getElementById(
    "historyList"
    ).prepend(div);
}

/* ---------- TORCH ---------- */

async function toggleTorch(){

    try{

        torch=!torch;

        await html5QrCode
        .applyVideoConstraints({

            advanced:[{
                torch:torch
            }]
        });

        showPopup(
        torch
        ? "Torch ON"
        : "Torch OFF"
        );

    }catch(err){

        alert(
        "Torch not supported"
        );
    }
}

/* ---------- MIRROR ---------- */

function toggleMirror(){

    mirror=!mirror;

    const video =
    document.querySelector(
    "#reader video"
    );

    if(video){

        if(mirror){

            video.style.transform=
            "scaleX(-1)";

        }else{

            video.style.transform=
            "scaleX(1)";
        }
    }

    showPopup(
    mirror
    ? "Mirror ON"
    : "Mirror OFF"
    );
}

/* ---------- BEEP ---------- */

function beep(){

    const audioCtx=
    new(window.AudioContext||
    window.webkitAudioContext)();

    const osc=
    audioCtx.createOscillator();

    const gain=
    audioCtx.createGain();

    osc.connect(gain);

    gain.connect(
        audioCtx.destination
    );

    osc.frequency.value=1200;

    gain.gain.value=0.2;

    osc.start();

    setTimeout(()=>{

        osc.stop();

        audioCtx.close();

    },120);
}

/* ---------- POPUP ---------- */

function showPopup(text){

    const popup =
    document.getElementById(
    "popup"
    );

    popup.innerHTML=text;

    popup.style.display=
    "block";

    clearTimeout(
    popup.timer
    );

    popup.timer=
    setTimeout(()=>{

        popup.style.display=
        "none";

    },2500);
}

/* ---------- INIT ---------- */

loadCameras();

</script>

</body>
</html>
