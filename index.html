<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QR & Barcode Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial, sans-serif;
    text-align:center;
}

h2{
    margin-top:15px;
}

#reader-container{
    position:relative;
    width:100%;
    max-width:500px;
    margin:auto;
}

#reader{
    width:100%;
    border:3px solid #00ff88;
    border-radius:12px;
    overflow:hidden;
}

#scanPopup{
    position:absolute;
    left:50%;
    bottom:20px;
    transform:translateX(-50%);
    background:rgba(0,0,0,0.85);
    color:#00ff88;
    padding:12px 18px;
    border-radius:12px;
    font-size:18px;
    max-width:90%;
    word-wrap:break-word;
    display:none;
    animation:popup 0.25s ease;
    border:2px solid #00ff88;
}

@keyframes popup{
    from{
        opacity:0;
        transform:translateX(-50%) scale(0.8);
    }
    to{
        opacity:1;
        transform:translateX(-50%) scale(1);
    }
}

.controls{
    margin-top:15px;
}

select, button{
    margin:5px;
    padding:12px;
    font-size:16px;
    border:none;
    border-radius:10px;
}

button{
    background:#00aa66;
    color:white;
}

button:hover{
    background:#00cc77;
}

#status{
    margin-top:15px;
    color:#ccc;
}

.mirror video{
    transform: scaleX(-1);
}

</style>
</head>

<body>

<h2>QR / Barcode Scanner</h2>

<div id="reader-container">

    <div id="reader"></div>

    <div id="scanPopup"></div>

</div>

<div class="controls">

    <select id="cameraSelect"></select>

    <br>

    <button onclick="startScanner()">Start</button>
    <button onclick="stopScanner()">Stop</button>
    <button onclick="toggleTorch()">Torch</button>
    <button onclick="toggleMirror()">Mirror</button>

</div>

<div id="status">
Waiting for scan...
</div>

<script>

let html5QrCode;
let cameras = [];
let currentCameraId = "";
let torchOn = false;
let mirrorOn = false;
let lastScanned = "";

const reader = document.getElementById("reader");
const popup = document.getElementById("scanPopup");

/* ---------- SOUND ---------- */

function playBeep(){

    const audioCtx =
        new(window.AudioContext ||
              window.webkitAudioContext)();

    const oscillator =
        audioCtx.createOscillator();

    const gainNode =
        audioCtx.createGain();

    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    oscillator.frequency.value = 1200;
    oscillator.type = "sine";

    gainNode.gain.value = 0.2;

    oscillator.start();

    setTimeout(() => {
        oscillator.stop();
        audioCtx.close();
    }, 120);
}

/* ---------- POPUP ---------- */

function showPopup(text){

    popup.innerHTML = text;

    popup.style.display = "block";

    clearTimeout(popup.hideTimer);

    popup.hideTimer = setTimeout(() => {
        popup.style.display = "none";
    }, 3000);
}

/* ---------- SCAN SUCCESS ---------- */

function onScanSuccess(decodedText){

    // prevent repeated same scan spam
    if(decodedText === lastScanned){
        return;
    }

    lastScanned = decodedText;

    showPopup(decodedText);

    document.getElementById("status").innerHTML =
        "Code detected";

    /* vibration */
    if(navigator.vibrate){
        navigator.vibrate([120, 50, 120]);
    }

    /* beep sound */
    playBeep();

    // allow same code again after 2 sec
    setTimeout(() => {
        lastScanned = "";
    }, 2000);
}

/* ---------- CAMERA LIST ---------- */

async function loadCameras(){

    cameras = await Html5Qrcode.getCameras();

    const select =
        document.getElementById("cameraSelect");

    select.innerHTML = "";

    cameras.forEach((camera, index) => {

        const option =
            document.createElement("option");

        option.value = camera.id;

        option.text =
            camera.label || ("Camera " + (index + 1));

        select.appendChild(option);
    });

    // Auto select back camera
    let backCamera = cameras.find(c =>
        c.label.toLowerCase().includes("back")
    );

    if(backCamera){
        select.value = backCamera.id;
    }
}

/* ---------- START ---------- */

async function startScanner(){

    try{

        if(html5QrCode){
            try{
                await html5QrCode.stop();
            }catch(e){}
        }

        currentCameraId =
            document.getElementById("cameraSelect").value;

        html5QrCode =
            new Html5Qrcode("reader");

        await html5QrCode.start(
            currentCameraId,
            {
                fps:10,
                qrbox:{
                    width:250,
                    height:250
                }
            },
            onScanSuccess
        );

        document.getElementById("status").innerHTML =
            "Scanner started";

    }catch(err){

        alert("Start Error: " + err);
    }
}

/* ---------- STOP ---------- */

async function stopScanner(){

    if(html5QrCode){

        await html5QrCode.stop();

        document.getElementById("status").innerHTML =
            "Scanner stopped";
    }
}

/* ---------- TORCH ---------- */

async function toggleTorch(){

    try{

        const capabilities =
            html5QrCode.getRunningTrackCapabilities();

        if(capabilities.torch){

            torchOn = !torchOn;

            await html5QrCode.applyVideoConstraints({
                advanced:[{ torch: torchOn }]
            });

            showPopup(
                torchOn ? "Torch ON" : "Torch OFF"
            );

        }else{

            alert("Torch not supported");
        }

    }catch(err){

        alert("Torch Error: " + err);
    }
}

/* ---------- MIRROR ---------- */

function toggleMirror(){

    mirrorOn = !mirrorOn;

    if(mirrorOn){

        reader.classList.add("mirror");

        showPopup("Mirror ON");

    }else{

        reader.classList.remove("mirror");

        showPopup("Mirror OFF");
    }
}

/* ---------- INIT ---------- */

loadCameras();

</script>

</body>
</html>
