<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Advanced QR & Barcode Scanner</title>

<style>

:root{
    --bg:#0f172a;
    --fg:#e2e8f0;
    --accent:#22d3ee;
    --green:#22c55e;
    --red:#ef4444;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:var(--bg);
    color:var(--fg);
    font-family:Arial,sans-serif;
    text-align:center;
}

h2{
    margin-top:15px;
}

#frameWrap{
    position:relative;
    width:100%;
    max-width:600px;
    margin:auto;
    border-radius:15px;
    overflow:hidden;
    border:2px solid var(--accent);
    background:black;
}

#video{
    display:none;
}

#view{
    width:100%;
    display:block;
}

#overlay{
    position:absolute;
    left:0;
    top:0;
    width:100%;
    height:100%;
    pointer-events:none;
}

/* animated scan line */

#scanline{
    position:absolute;
    left:0;
    width:100%;
    height:3px;
    background:var(--green);
    box-shadow:0 0 10px var(--green);
    animation:scan 2s linear infinite;
}

@keyframes scan{
    0%{ top:10%; }
    50%{ top:85%; }
    100%{ top:10%; }
}

/* popup */

#popup{
    position:absolute;
    left:50%;
    bottom:20px;
    transform:translateX(-50%);
    background:rgba(0,0,0,0.85);
    color:var(--green);
    padding:12px 18px;
    border-radius:12px;
    border:2px solid var(--green);
    max-width:90%;
    word-wrap:break-word;
    display:none;
    animation:pop 0.2s ease;
}

@keyframes pop{
    from{
        opacity:0;
        transform:translateX(-50%) scale(0.8);
    }
    to{
        opacity:1;
        transform:translateX(-50%) scale(1);
    }
}

.controls{
    margin-top:15px;
}

select,button{
    margin:5px;
    padding:12px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

button{
    background:#111827;
    color:white;
    border:1px solid #334155;
}

button:hover{
    border-color:var(--accent);
}

#history{
    margin:20px auto;
    width:95%;
    max-width:600px;
    text-align:left;
    background:#111827;
    border-radius:12px;
    padding:10px;
}

.historyItem{
    padding:10px;
    border-bottom:1px solid #334155;
    word-wrap:break-word;
}

.mirror{
    transform:scaleX(-1);
}

</style>

<script type="module">

import {
BrowserMultiFormatReader
}
from "https://cdn.jsdelivr.net/npm/@zxing/library@0.20.0/+esm";

window.codeReader =
new BrowserMultiFormatReader();

</script>

</head>

<body>

<h2>Advanced QR & Barcode Scanner</h2>

<div id="frameWrap">

    <video id="video" playsinline></video>

    <canvas id="view"></canvas>

    <canvas id="overlay"></canvas>

    <div id="scanline"></div>

    <div id="popup"></div>

</div>

<div class="controls">

    <select id="cameraSelect"></select>

    <br>

    <button id="startBtn">Start</button>
    <button id="stopBtn">Stop</button>
    <button id="torchBtn">Torch</button>
    <button id="mirrorBtn">Mirror</button>
    <button id="fullscreenBtn">Fullscreen</button>

</div>

<div id="history">

<b>Scan History</b>

<div id="historyList"></div>

</div>

<script type="module">

const video=document.getElementById("video");
const view=document.getElementById("view");
const overlay=document.getElementById("overlay");

const vctx=view.getContext("2d");
const ctx=overlay.getContext("2d");

const popup=document.getElementById("popup");

const cameraSelect=
document.getElementById("cameraSelect");

const codeReader=window.codeReader;

let stream=null;
let track=null;

let vw=0;
let vh=0;

let mirror=false;
let torch=false;

let renderRunning=false;

let lastScan="";

/* ---------- SOUND ---------- */

function beep(){

    const audioCtx=
    new(window.AudioContext||
    window.webkitAudioContext)();

    const osc=audioCtx.createOscillator();
    const gain=audioCtx.createGain();

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.frequency.value=1200;
    osc.type="sine";

    gain.gain.value=0.2;

    osc.start();

    setTimeout(()=>{
        osc.stop();
        audioCtx.close();
    },120);
}

/* ---------- POPUP ---------- */

function showPopup(text){

    popup.innerHTML=text;

    popup.style.display="block";

    clearTimeout(popup.timer);

    popup.timer=setTimeout(()=>{
        popup.style.display="none";
    },3000);
}

/* ---------- HISTORY ---------- */

function addHistory(text){

    const div=document.createElement("div");

    div.className="historyItem";

    div.innerHTML=
    "<b>"+new Date().toLocaleTimeString()+
    "</b><br>"+text;

    const historyList=
    document.getElementById("historyList");

    historyList.prepend(div);
}

/* ---------- CAMERA ---------- */

async function loadCameras(){

    const devices=
    await navigator.mediaDevices
    .enumerateDevices();

    const cams=devices.filter(
        d=>d.kind==="videoinput"
    );

    cameraSelect.innerHTML="";

    cams.forEach((cam,index)=>{

        const option=
        document.createElement("option");

        option.value=cam.deviceId;

        option.textContent=
        cam.label ||
        "Camera "+(index+1);

        cameraSelect.appendChild(option);
    });

    // auto select back camera

    const backCam=cams.find(c=>
    c.label.toLowerCase()
    .includes("back"));

    if(backCam){
        cameraSelect.value=backCam.deviceId;
    }
}

/* ---------- START ---------- */

async function startScanner(){

    stopScanner();

    try{

        stream=await
        navigator.mediaDevices
        .getUserMedia({

            video:{
                deviceId:{
                    exact:
                    cameraSelect.value
                }
            }
        });

        video.srcObject=stream;

        await video.play();

        track=stream
        .getVideoTracks()[0];

        vw=video.videoWidth;
        vh=video.videoHeight;

        view.width=vw;
        view.height=vh;

        overlay.width=vw;
        overlay.height=vh;

        renderLoop();

        codeReader.decodeFromVideoDevice(
            null,
            video,
            (result)=>{

                if(result){

                    const text=result.text;

                    if(text===lastScan){
                        return;
                    }

                    lastScan=text;

                    drawBox(
                        result.resultPoints
                    );

                    showPopup(text);

                    addHistory(text);

                    beep();

                    if(navigator.vibrate){
                        navigator.vibrate(
                            [120,50,120]
                        );
                    }

                    // auto copy

                    navigator.clipboard
                    .writeText(text);

                    // auto open URL

                    if(
                    text.startsWith("http")
                    ){

                        setTimeout(()=>{

                            if(confirm(
                            "Open URL?\n\n"
                            +text
                            )){

                                window.open(
                                text,
                                "_blank"
                                );

                            }

                        },200);
                    }

                    setTimeout(()=>{
                        lastScan="";
                    },2000);
                }
            });

    }catch(err){

        alert(err);
    }
}

/* ---------- STOP ---------- */

function stopScanner(){

    try{
        codeReader.reset();
    }catch(e){}

    if(stream){

        stream.getTracks()
        .forEach(t=>t.stop());

        stream=null;
    }

    renderRunning=false;
}

/* ---------- RENDER ---------- */

function renderLoop(){

    renderRunning=true;

    function loop(){

        if(!renderRunning){
            return;
        }

        requestAnimationFrame(loop);

        if(mirror){

            vctx.save();

            vctx.translate(view.width,0);

            vctx.scale(-1,1);

            vctx.drawImage(
                video,
                0,
                0,
                view.width,
                view.height
            );

            vctx.restore();

        }else{

            vctx.drawImage(
                video,
                0,
                0,
                view.width,
                view.height
            );
        }
    }

    loop();
}

/* ---------- DRAW BOX ---------- */

function drawBox(points){

    ctx.clearRect(
        0,
        0,
        overlay.width,
        overlay.height
    );

    if(!points || points.length<2){
        return;
    }

    ctx.strokeStyle="#22c55e";

    ctx.lineWidth=4;

    ctx.beginPath();

    points.forEach((p,index)=>{

        let x=p.x;
        let y=p.y;

        if(mirror){
            x=overlay.width-x;
        }

        if(index===0){
            ctx.moveTo(x,y);
        }else{
            ctx.lineTo(x,y);
        }
    });

    ctx.closePath();

    ctx.stroke();

    setTimeout(()=>{
        ctx.clearRect(
            0,
            0,
            overlay.width,
            overlay.height
        );
    },500);
}

/* ---------- TORCH ---------- */

async function toggleTorch(){

    if(!track){
        return;
    }

    const caps=
    track.getCapabilities();

    if(!caps.torch){

        alert(
        "Torch not supported"
        );

        return;
    }

    torch=!torch;

    await track.applyConstraints({
        advanced:[{
            torch:torch
        }]
    });
}

/* ---------- MIRROR ---------- */

function toggleMirror(){

    mirror=!mirror;

    if(mirror){
        showPopup("Mirror ON");
    }else{
        showPopup("Mirror OFF");
    }
}

/* ---------- FULLSCREEN ---------- */

function toggleFullscreen(){

    if(!document.fullscreenElement){

        document.documentElement
        .requestFullscreen();

    }else{

        document.exitFullscreen();
    }
}

/* ---------- EVENTS ---------- */

document
.getElementById("startBtn")
.onclick=startScanner;

document
.getElementById("stopBtn")
.onclick=stopScanner;

document
.getElementById("torchBtn")
.onclick=toggleTorch;

document
.getElementById("mirrorBtn")
.onclick=toggleMirror;

document
.getElementById("fullscreenBtn")
.onclick=toggleFullscreen;

/* ---------- INIT ---------- */

loadCameras();

</script>

</body>
</html>
