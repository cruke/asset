<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>Professional Asset Barcode Scanner</title>

<style>

:root{
    --bg:#0f172a;
    --fg:#e2e8f0;
    --accent:#22d3ee;
    --green:#22c55e;
    --red:#ef4444;
}

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    margin:0;
    background:var(--bg);
    color:var(--fg);
    font-family:Arial,sans-serif;
    overflow-x:hidden;
}

header{
    text-align:center;
    padding:14px;
    font-size:22px;
    font-weight:bold;
    color:var(--accent);
}

/* ---------- CONTROLS ---------- */

.controls{
    padding:12px;
}

select{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#111827;
    color:white;
    font-size:16px;
    margin-bottom:10px;
}

.buttons{
    display:grid;
    grid-template-columns:
    repeat(2,1fr);
    gap:10px;
}

button{
    padding:14px;
    border:none;
    border-radius:12px;
    background:#111827;
    color:white;
    font-size:16px;
}

button:active{
    transform:scale(0.97);
}

/* ---------- CAMERA ---------- */

#frameWrap{
    position:relative;
    width:100%;
    height:50vh;
    overflow:hidden;
    background:black;
}

/* hidden raw video */

#video{
    display:none;
}

/* rendered camera */

#view{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

/* ---------- OVERLAY ---------- */

#overlay{
    position:absolute;
    inset:0;
    pointer-events:none;
}

/* ---------- VIEWFINDER ---------- */

#roi{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    width:340px;
    height:180px;
    border:2px solid rgba(255,255,255,0.12);
    border-radius:18px;
}

/* top left */

#roi::before{
    content:"";
    position:absolute;
    top:-3px;
    left:-3px;
    width:50px;
    height:50px;
    border-top:5px solid var(--green);
    border-left:5px solid var(--green);
    border-top-left-radius:18px;
}

/* bottom right */

#roi::after{
    content:"";
    position:absolute;
    right:-3px;
    bottom:-3px;
    width:50px;
    height:50px;
    border-right:5px solid var(--green);
    border-bottom:5px solid var(--green);
    border-bottom-right-radius:18px;
}

/* top right */

.corner1{
    position:absolute;
    top:-3px;
    right:-3px;
    width:50px;
    height:50px;
    border-top:5px solid var(--green);
    border-right:5px solid var(--green);
    border-top-right-radius:18px;
}

/* bottom left */

.corner2{
    position:absolute;
    left:-3px;
    bottom:-3px;
    width:50px;
    height:50px;
    border-left:5px solid var(--green);
    border-bottom:5px solid var(--green);
    border-bottom-left-radius:18px;
}

/* ---------- SCAN LINE ---------- */

#scanline{
    position:absolute;
    left:50%;
    top:50%;
    transform:translateX(-50%);
    width:320px;
    height:3px;
    background:var(--green);
    box-shadow:0 0 10px var(--green);
    animation:scan 2s linear infinite;
}

@keyframes scan{

    0%{
        margin-top:-75px;
    }

    50%{
        margin-top:75px;
    }

    100%{
        margin-top:-75px;
    }
}

/* ---------- STATUS ---------- */

.status{
    text-align:center;
    padding:10px;
    color:var(--green);
    font-size:16px;
}

/* ---------- RESULT ---------- */

#resultBox{
    margin:12px;
    background:#111827;
    border-radius:14px;
    padding:14px;
    display:none;
}

.resultTitle{
    color:var(--accent);
    font-size:18px;
    margin-bottom:12px;
    font-weight:bold;
}

.resultItem{
    margin-bottom:12px;
}

.resultLabel{
    color:#94a3b8;
    font-size:13px;
}

.resultValue{
    font-size:17px;
    margin-top:3px;
    word-break:break-word;
}

/* ---------- HISTORY ---------- */

#history{
    padding:12px;
}

.historyItem{
    background:#111827;
    padding:12px;
    margin-bottom:10px;
    border-radius:12px;
    border-left:4px solid var(--green);
    font-size:14px;
    word-break:break-word;
}

/* ---------- POPUP ---------- */

#popup{
    position:fixed;
    left:50%;
    bottom:20px;
    transform:translateX(-50%);
    width:90%;
    max-width:400px;
    background:rgba(0,0,0,0.92);
    border:2px solid var(--green);
    border-radius:14px;
    padding:14px;
    color:var(--green);
    text-align:center;
    display:none;
    z-index:9999;
}

</style>

</head>

<body>

<header>
Professional Asset Barcode Scanner
</header>

<!-- CONTROLS -->

<div class="controls">

    <select id="cameraSelect"></select>

    <div class="buttons">

        <button id="startBtn">
        Start
        </button>

        <button id="stopBtn">
        Stop
        </button>

        <button id="torchBtn">
        Torch
        </button>

        <button id="mirrorBtn">
        Mirror
        </button>

    </div>

</div>

<!-- CAMERA -->

<div id="frameWrap">

    <video id="video"
    playsinline></video>

    <canvas id="view"></canvas>

    <div id="overlay">

        <div id="roi">

            <div class="corner1"></div>

            <div class="corner2"></div>

        </div>

        <div id="scanline"></div>

    </div>

</div>

<!-- STATUS -->

<div class="status"
id="status">

Waiting...

</div>

<!-- RESULT -->

<div id="resultBox">

    <div class="resultTitle">
    Asset Information
    </div>

    <div class="resultItem">

        <div class="resultLabel">
        NO SIRI PENDAFTARAN
        </div>

        <div class="resultValue"
        id="resultSiri">
        -
        </div>

    </div>

    <div class="resultItem">

        <div class="resultLabel">
        KETERANGAN ASET
        </div>

        <div class="resultValue"
        id="resultAset">
        -
        </div>

    </div>

    <div class="resultItem">

        <div class="resultLabel">
        LOKASI SEMASA
        </div>

        <div class="resultValue"
        id="resultLokasi">
        -
        </div>

    </div>

</div>

<!-- HISTORY -->

<div id="history">

<h3>
Scan History
</h3>

<div id="historyList"></div>

</div>

<!-- POPUP -->

<div id="popup"></div>

<script type="module">

import {
BrowserMultiFormatReader,
BarcodeFormat,
DecodeHintType
}
from
"https://cdn.jsdelivr.net/npm/@zxing/library@0.20.0/+esm";

/* ---------- ZXING HINTS ---------- */

const hints =
new Map();

hints.set(
DecodeHintType.POSSIBLE_FORMATS,
[
    BarcodeFormat.QR_CODE,
    BarcodeFormat.CODE_128,
    BarcodeFormat.CODE_39,
    BarcodeFormat.EAN_13,
    BarcodeFormat.EAN_8,
    BarcodeFormat.UPC_A,
    BarcodeFormat.UPC_E,
    BarcodeFormat.ITF
]
);

const codeReader =
new BrowserMultiFormatReader(
hints);

/* ---------- CONFIG ---------- */

const GAS_URL =
"https://script.google.com/macros/s/AKfycbyUEjurhn07mG8zmal7W9HUwiCer_RABw503xgpR3WDSZs8SxxsssLs2roG0x96T-G5fQ/exec";

/* ---------- DOM ---------- */

const video =
document.getElementById("video");

const view =
document.getElementById("view");

const vctx =
view.getContext("2d");

const popup =
document.getElementById("popup");

const statusLabel =
document.getElementById("status");

/* ---------- VARIABLES ---------- */

let stream=null;
let track=null;

let vw=0;
let vh=0;

let cropY=0;
let cropH=0;

let renderRunning=false;
let decodeRunning=false;

let torch=false;
let mirror=false;

let lastText="";
let lastScanTime=0;

/* ---------- LOAD CAMERAS ---------- */

async function loadCameras(){

    try{

        const temp =
        await navigator
        .mediaDevices
        .getUserMedia({
            video:true
        });

        temp.getTracks()
        .forEach(t=>t.stop());

        const devices =
        await navigator
        .mediaDevices
        .enumerateDevices();

        const cams =
        devices.filter(d=>
        d.kind==="videoinput"
        );

        const select =
        document.getElementById(
        "cameraSelect"
        );

        select.innerHTML="";

        cams.forEach((cam,index)=>{

            const option =
            document.createElement(
            "option"
            );

            option.value =
            cam.deviceId;

            option.textContent =
            cam.label ||
            "Camera "+(index+1);

            select.appendChild(
            option
            );
        });

    }catch(err){

        alert(
        "Camera permission required"
        );
    }
}

/* ---------- START ---------- */

async function startScanner(){

    stopScanner();

    try{

        const deviceId =
        document.getElementById(
        "cameraSelect"
        ).value;

        stream =
        await navigator
        .mediaDevices
        .getUserMedia({

            video:{
                deviceId:{
                    exact:deviceId
                },
                facingMode:"environment",
                width:{ideal:1920},
                height:{ideal:1080}
            }
        });

        video.srcObject=
        stream;

        await video.play();

        track =
        stream
        .getVideoTracks()[0];

        vw =
        video.videoWidth;

        vh =
        video.videoHeight;

        /* BARCODE OPTIMIZED CROP */

        cropY =
        Math.floor(vh * 0.15);

        cropH =
        Math.floor(vh * 0.70);

        view.width=vw;
        view.height=cropH;

        startRender();

        startDecode();

        statusLabel.innerHTML=
        "Scanner Started";

    }catch(err){

        console.log(err);

        alert(err);
    }
}

/* ---------- STOP ---------- */

function stopScanner(){

    stopDecode();

    stopRender();

    try{
        codeReader.reset();
    }catch(e){}

    if(stream){

        stream
        .getTracks()
        .forEach(t=>t.stop());

        stream=null;
    }

    statusLabel.innerHTML=
    "Scanner Stopped";
}

/* ---------- RENDER ---------- */

function startRender(){

    if(renderRunning){
        return;
    }

    renderRunning=true;

    function loop(){

        if(!renderRunning){
            return;
        }

        requestAnimationFrame(loop);

        if(!vw || !vh){
            return;
        }

        vctx.save();

        if(mirror){

            vctx.translate(
            view.width,
            0
            );

            vctx.scale(-1,1);
        }

        vctx.drawImage(

            video,

            0,
            cropY,
            vw,
            cropH,

            0,
            0,
            view.width,
            view.height
        );

        vctx.restore();
    }

    loop();
}

function stopRender(){

    renderRunning=false;
}

/* ---------- DECODE ---------- */

function startDecode(){

    if(decodeRunning){
        return;
    }

    decodeRunning=true;

    codeReader
    .decodeFromVideoDevice(

        null,

        video,

        (result)=>{

            if(!decodeRunning){
                return;
            }

            if(result){

                const text =
                result.getText
                ? result.getText()
                : result.text;

                handleScan(text);
            }
        }
    );
}

function stopDecode(){

    decodeRunning=false;

    try{
        codeReader.reset();
    }catch(e){}
}

/* ---------- HANDLE SCAN ---------- */

async function handleScan(text){

    const now =
    Date.now();

    if(
        text===lastText &&
        (now-lastScanTime)
        <3000
    ){
        return;
    }

    lastText=text;
    lastScanTime=now;

    beep();

    if(
    navigator.vibrate
    ){
        navigator.vibrate(
        [120,50,120]
        );
    }

    await searchAsset(text);
}

/* ---------- SEARCH DATABASE ---------- */

async function searchAsset(code){

    try{

        statusLabel.innerHTML=
        "Searching Database...";

        const response=
        await fetch(
        GAS_URL,
        {

            method:"POST",

            headers:{
                "Content-Type":
                "text/plain"
            },

            body:JSON.stringify({
                id:code
            })
        });

        const data=
        await response.json();

        if(data.found){

            statusLabel.innerHTML=
            "Asset Found";

            document
            .getElementById(
            "resultBox"
            ).style.display=
            "block";

            document
            .getElementById(
            "resultSiri"
            ).innerHTML=
            data.no_siri;

            document
            .getElementById(
            "resultAset"
            ).innerHTML=
            data.keterangan;

            document
            .getElementById(
            "resultLokasi"
            ).innerHTML=
            data.lokasi;

            addHistory(
                code,
                data.no_siri,
                data.keterangan,
                data.lokasi,
                true
            );

            showPopup(
            "Asset Found"
            );

        }else{

            statusLabel.innerHTML=
            "Asset Not Found";

            document
            .getElementById(
            "resultBox"
            ).style.display=
            "none";

            addHistory(
                code,
                "",
                "",
                "",
                false
            );

            showPopup(
            "Asset Not Found"
            );
        }

    }catch(err){

        console.log(err);

        statusLabel.innerHTML=
        "Network Error";

        showPopup(
        "Network Error"
        );
    }
}

/* ---------- HISTORY ---------- */

function addHistory(
    qr,
    siri,
    aset,
    lokasi,
    found
){

    const div=
    document.createElement(
    "div"
    );

    div.className=
    "historyItem";

    let html=
    "<b>"+
    new Date()
    .toLocaleString()+
    "</b><br><br>";

    html+=
    "<b>QR:</b><br>"+
    qr+
    "<br><br>";

    if(found){

        html+=
        "<b>NO SIRI:</b><br>"+
        siri+
        "<br><br>";

        html+=
        "<b>ASET:</b><br>"+
        aset+
        "<br><br>";

        html+=
        "<b>LOKASI:</b><br>"+
        lokasi;

    }else{

        html+=
        "<span style='color:#ef4444'>Asset Not Found</span>";
    }

    div.innerHTML=html;

    document
    .getElementById(
    "historyList"
    )
    .prepend(div);
}

/* ---------- TORCH ---------- */

async function toggleTorch(){

    if(!track){
        return;
    }

    const caps=
    track.getCapabilities?.()
    || {};

    if(!caps.torch){

        alert(
        "Torch not supported"
        );

        return;
    }

    torch=!torch;

    await track.applyConstraints({

        advanced:[{
            torch:torch
        }]
    });

    showPopup(
    torch
    ? "Torch ON"
    : "Torch OFF"
    );
}

/* ---------- MIRROR ---------- */

function toggleMirror(){

    mirror=!mirror;

    showPopup(
    mirror
    ? "Mirror ON"
    : "Mirror OFF"
    );
}

/* ---------- BEEP ---------- */

function beep(){

    const audioCtx=
    new(window.AudioContext||
    window.webkitAudioContext)();

    const osc=
    audioCtx.createOscillator();

    const gain=
    audioCtx.createGain();

    osc.connect(gain);

    gain.connect(
        audioCtx.destination
    );

    osc.frequency.value=1200;

    gain.gain.value=0.2;

    osc.start();

    setTimeout(()=>{

        osc.stop();

        audioCtx.close();

    },120);
}

/* ---------- POPUP ---------- */

function showPopup(text){

    popup.innerHTML=text;

    popup.style.display=
    "block";

    clearTimeout(
    popup.timer
    );

    popup.timer=
    setTimeout(()=>{

        popup.style.display=
        "none";

    },2500);
}

/* ---------- EVENTS ---------- */

document
.getElementById(
"startBtn"
)
.onclick=startScanner;

document
.getElementById(
"stopBtn"
)
.onclick=stopScanner;

document
.getElementById(
"torchBtn"
)
.onclick=toggleTorch;

document
.getElementById(
"mirrorBtn"
)
.onclick=toggleMirror;

/* ---------- INIT ---------- */

loadCameras();

</script>

</body>
</html>
