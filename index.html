<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>QR & Barcode Scanner</title>

<style>

body{
    margin:0;
    background:#0f172a;
    color:white;
    font-family:Arial,sans-serif;
    overflow-x:hidden;
}

header{
    text-align:center;
    padding:14px;
    font-size:22px;
    font-weight:bold;
    color:#22d3ee;
}

/* ---------- CROPPED CAMERA ---------- */

#reader{
    width:100%;
    height:50vh;
    overflow:hidden;
    position:relative;
    background:black;
}

/* center crop */

#reader video{
    width:100%;
    height:100vh;
    object-fit:cover;
    position:absolute;
    top:50%;
    left:0;
    transform:translateY(-50%);
}

/* ---------- VIEWFINDER BOX ---------- */

#roi{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    width:260px;
    height:260px;
    border:2px solid rgba(255,255,255,0.15);
    border-radius:20px;
    z-index:10;
    pointer-events:none;
}

/* top left */

#roi::before{
    content:"";
    position:absolute;
    top:-3px;
    left:-3px;
    width:60px;
    height:60px;
    border-top:5px solid #22c55e;
    border-left:5px solid #22c55e;
    border-top-left-radius:20px;
}

/* bottom right */

#roi::after{
    content:"";
    position:absolute;
    right:-3px;
    bottom:-3px;
    width:60px;
    height:60px;
    border-right:5px solid #22c55e;
    border-bottom:5px solid #22c55e;
    border-bottom-right-radius:20px;
}

/* top right */

.corner1{
    position:absolute;
    top:-3px;
    right:-3px;
    width:60px;
    height:60px;
    border-top:5px solid #22c55e;
    border-right:5px solid #22c55e;
    border-top-right-radius:20px;
}

/* bottom left */

.corner2{
    position:absolute;
    left:-3px;
    bottom:-3px;
    width:60px;
    height:60px;
    border-left:5px solid #22c55e;
    border-bottom:5px solid #22c55e;
    border-bottom-left-radius:20px;
}

/* ---------- SCAN LINE ---------- */

#scanline{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    width:240px;
    height:3px;
    background:#22c55e;
    box-shadow:0 0 10px #22c55e;
    animation:scan 2s linear infinite;
    z-index:11;
}

@keyframes scan{

    0%{
        top:calc(50% - 120px);
    }

    50%{
        top:calc(50% + 120px);
    }

    100%{
        top:calc(50% - 120px);
    }
}

/* ---------- CONTROLS ---------- */

.controls{
    padding:12px;
}

select{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#111827;
    color:white;
    font-size:16px;
    margin-bottom:10px;
}

.buttons{
    display:grid;
    grid-template-columns:
    repeat(2,1fr);
    gap:10px;
}

button{
    padding:14px;
    border:none;
    border-radius:12px;
    background:#111827;
    color:white;
    font-size:16px;
}

button:active{
    transform:scale(0.97);
}

/* ---------- POPUP ---------- */

#popup{
    position:fixed;
    left:50%;
    bottom:20px;
    transform:translateX(-50%);
    width:90%;
    max-width:400px;
    background:rgba(0,0,0,0.9);
    border:2px solid #22c55e;
    border-radius:14px;
    padding:14px;
    color:#22c55e;
    text-align:center;
    word-break:break-word;
    display:none;
    z-index:9999;
}

/* ---------- HISTORY ---------- */

#history{
    padding:12px;
}

.historyItem{
    background:#111827;
    padding:10px;
    margin-bottom:8px;
    border-radius:10px;
    font-size:14px;
    word-break:break-word;
}

/* ---------- STATUS ---------- */

.status{
    text-align:center;
    padding:10px;
    color:#22c55e;
}

</style>

<script src="https://unpkg.com/html5-qrcode"></script>

</head>

<body>

<header>
QR & Barcode Scanner
</header>

<div id="reader">

    <div id="roi">

        <div class="corner1"></div>

        <div class="corner2"></div>

    </div>

    <div id="scanline"></div>

</div>

<div class="controls">

    <select id="cameraSelect"></select>

    <div class="buttons">

        <button onclick="startScanner()">
        Start
        </button>

        <button onclick="stopScanner()">
        Stop
        </button>

        <button onclick="toggleTorch()">
        Torch
        </button>

        <button onclick="toggleMirror()">
        Mirror
        </button>

    </div>

</div>

<div class="status"
id="status">

Waiting...

</div>

<div id="history">

<b>Scan History</b>

<div id="historyList"></div>

</div>

<div id="popup"></div>

<script>

/* ---------- GOOGLE SHEETS ---------- */

const GAS_URL =
"https://script.google.com/macros/s/AKfycbyUEjurhn07mG8zmal7W9HUwiCer_RABw503xgpR3WDSZs8SxxsssLs2roG0x96T-G5fQ/exec";

/* ---------- VARIABLES ---------- */

let html5QrCode;

let currentCameraId="";

let torch=false;

let mirror=false;

let lastText="";
let lastScanTime=0;

/* ---------- LOAD CAMERAS ---------- */

async function loadCameras(){

    const devices =
    await Html5Qrcode
    .getCameras();

    const select =
    document
    .getElementById(
    "cameraSelect"
    );

    select.innerHTML="";

    devices.forEach((device,index)=>{

        const option =
        document
        .createElement(
        "option"
        );

        option.value =
        device.id;

        option.text =
        device.label ||
        "Camera "+(index+1);

        select.appendChild(
        option
        );
    });

    const backCam =
    devices.find(d=>
    d.label
    .toLowerCase()
    .includes("back")
    );

    if(backCam){

        select.value =
        backCam.id;
    }

    currentCameraId =
    select.value;
}

/* ---------- START ---------- */

async function startScanner(){

    await stopScanner();

    currentCameraId =
    document
    .getElementById(
    "cameraSelect"
    ).value;

    html5QrCode =
    new Html5Qrcode(
    "reader"
    );

    try{

        await html5QrCode.start(

            currentCameraId,

            {
                fps:10,

                qrbox:{
                    width:240,
                    height:240
                }
            },

            async(decodedText)=>{

                const now =
                Date.now();

                // prevent repeated scans

                if(
                    decodedText === lastText &&
                    (now - lastScanTime)
                    < 3000
                ){
                    return;
                }

                lastText =
                decodedText;

                lastScanTime =
                now;

                showPopup(
                decodedText
                );

                addHistory(
                decodedText
                );

                beep();

                if(
                navigator.vibrate
                ){
                    navigator.vibrate(
                    [120,50,120]
                    );
                }

                await sendToSheet(
                decodedText
                );
            }
        );

        document
        .getElementById(
        "status"
        ).innerHTML=
        "Scanner Started";

    }catch(err){

        alert(err);
    }
}

/* ---------- STOP ---------- */

async function stopScanner(){

    try{

        if(html5QrCode){

            await html5QrCode
            .stop();

            await html5QrCode
            .clear();
        }

    }catch(e){}
}

/* ---------- TORCH ---------- */

async function toggleTorch(){

    try{

        torch=!torch;

        await html5QrCode
        .applyVideoConstraints({

            advanced:[{
                torch:torch
            }]
        });

        showPopup(
        torch
        ? "Torch ON"
        : "Torch OFF"
        );

    }catch(err){

        alert(
        "Torch not supported"
        );
    }
}

/* ---------- MIRROR ---------- */

function toggleMirror(){

    mirror=!mirror;

    const video =
    document.querySelector(
    "#reader video"
    );

    if(video){

        if(mirror){

            video.style.transform=
            "translateY(-50%) scaleX(-1)";

        }else{

            video.style.transform=
            "translateY(-50%) scaleX(1)";
        }
    }

    showPopup(
    mirror
    ? "Mirror ON"
    : "Mirror OFF"
    );
}

/* ---------- BEEP ---------- */

function beep(){

    const audioCtx=
    new(window.AudioContext||
    window.webkitAudioContext)();

    const osc=
    audioCtx.createOscillator();

    const gain=
    audioCtx.createGain();

    osc.connect(gain);

    gain.connect(
        audioCtx.destination
    );

    osc.frequency.value=1200;

    gain.gain.value=0.2;

    osc.start();

    setTimeout(()=>{

        osc.stop();

        audioCtx.close();

    },120);
}

/* ---------- POPUP ---------- */

function showPopup(text){

    const popup =
    document
    .getElementById(
    "popup"
    );

    popup.innerHTML=text;

    popup.style.display=
    "block";

    clearTimeout(
    popup.timer
    );

    popup.timer=
    setTimeout(()=>{

        popup.style.display=
        "none";

    },3000);
}

/* ---------- HISTORY ---------- */

function addHistory(text){

    const div =
    document
    .createElement(
    "div"
    );

    div.className=
    "historyItem";

    div.innerHTML=
    "<b>"+
    new Date()
    .toLocaleTimeString()+
    "</b><br>"+text;

    document
    .getElementById(
    "historyList"
    )
    .prepend(div);
}

/* ---------- GOOGLE SHEETS ---------- */

async function sendToSheet(code){

    try{

        document
        .getElementById(
        "status"
        ).innerHTML=
        "Saving...";

        await fetch(
        GAS_URL,
        {

            method:"POST",

            headers:{
                "Content-Type":
                "text/plain"
            },

            body:JSON.stringify({

                id:code,

                time:new Date()
                .toLocaleString()

            })
        });

        document
        .getElementById(
        "status"
        ).innerHTML=
        "Saved";

    }catch(err){

        document
        .getElementById(
        "status"
        ).innerHTML=
        "Network Error";
    }
}

/* ---------- INIT ---------- */

loadCameras();

</script>

</body>
</html>
