<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QR & Barcode Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial, sans-serif;
    text-align:center;
}

h2{
    margin-top:15px;
}

#reader{
    width:100%;
    max-width:500px;
    margin:auto;
    border:3px solid #00ff88;
    border-radius:12px;
    overflow:hidden;
}

.controls{
    margin-top:15px;
}

select, button{
    margin:5px;
    padding:12px;
    font-size:16px;
    border:none;
    border-radius:10px;
}

button{
    background:#00aa66;
    color:white;
}

button:hover{
    background:#00cc77;
}

#result{
    margin-top:20px;
    padding:15px;
    background:#222;
    font-size:18px;
    word-wrap:break-word;
}

.mirror video{
    transform: scaleX(-1);
}

</style>
</head>

<body>

<h2>QR / Barcode Scanner</h2>

<div id="reader"></div>

<div class="controls">

    <select id="cameraSelect"></select>

    <br>

    <button onclick="startScanner()">Start</button>
    <button onclick="stopScanner()">Stop</button>
    <button onclick="toggleTorch()">Torch</button>
    <button onclick="toggleMirror()">Mirror</button>

</div>

<div id="result">
Waiting for scan...
</div>

<script>

let html5QrCode;
let cameras = [];
let currentCameraId = "";
let torchOn = false;
let mirrorOn = false;

const reader = document.getElementById("reader");

function onScanSuccess(decodedText){

    document.getElementById("result").innerHTML =
        "<b>Detected:</b><br>" + decodedText;

    if(navigator.vibrate){
        navigator.vibrate(200);
    }
}

async function loadCameras(){

    cameras = await Html5Qrcode.getCameras();

    const select = document.getElementById("cameraSelect");

    select.innerHTML = "";

    cameras.forEach((camera, index) => {

        const option = document.createElement("option");

        option.value = camera.id;
        option.text =
            camera.label || ("Camera " + (index + 1));

        select.appendChild(option);
    });

    // auto select back camera
    let backCamera = cameras.find(c =>
        c.label.toLowerCase().includes("back")
    );

    if(backCamera){
        select.value = backCamera.id;
    }
}

async function startScanner(){

    try{

        if(html5QrCode){
            try{
                await html5QrCode.stop();
            }catch(e){}
        }

        currentCameraId =
            document.getElementById("cameraSelect").value;

        html5QrCode = new Html5Qrcode("reader");

        await html5QrCode.start(
            currentCameraId,
            {
                fps:10,
                qrbox:{
                    width:250,
                    height:250
                }
            },
            onScanSuccess
        );

        document.getElementById("result").innerHTML =
            "Scanner started";

    }catch(err){

        alert("Start Error: " + err);
    }
}

async function stopScanner(){

    if(html5QrCode){

        await html5QrCode.stop();

        document.getElementById("result").innerHTML =
            "Scanner stopped";
    }
}

async function toggleTorch(){

    try{

        const track =
            html5QrCode.getRunningTrackSettings();

        const capabilities =
            html5QrCode.getRunningTrackCapabilities();

        if(capabilities.torch){

            torchOn = !torchOn;

            await html5QrCode.applyVideoConstraints({
                advanced: [{ torch: torchOn }]
            });

            document.getElementById("result").innerHTML =
                torchOn ? "Torch ON" : "Torch OFF";

        }else{

            alert("Torch not supported on this device");
        }

    }catch(err){

        alert("Torch Error: " + err);
    }
}

function toggleMirror(){

    mirrorOn = !mirrorOn;

    if(mirrorOn){
        reader.classList.add("mirror");
    }else{
        reader.classList.remove("mirror");
    }
}

loadCameras();

</script>

</body>
</html>
