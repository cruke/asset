<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>Asset QR & Barcode Scanner</title>

<style>

:root{
    --bg:#0f172a;
    --fg:#e2e8f0;
    --accent:#22d3ee;
    --green:#22c55e;
    --red:#ef4444;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:var(--bg);
    color:var(--fg);
    font-family:Arial,sans-serif;
    overflow-x:hidden;
}

header{
    padding:14px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    color:var(--accent);
    background:#111827;
    border-bottom:2px solid var(--accent);
}

/* ---------- CONTROLS ---------- */

.controls{
    padding:12px;
}

select{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#111827;
    color:white;
    font-size:16px;
    margin-bottom:10px;
}

.buttons{
    display:grid;
    grid-template-columns:
    repeat(2,1fr);
    gap:10px;
}

button{
    padding:14px;
    border:none;
    border-radius:12px;
    background:#111827;
    color:white;
    font-size:16px;
}

button:active{
    transform:scale(0.97);
}

/* ---------- CAMERA ---------- */

#frameWrap{
    position:relative;
    width:100%;
    height:50vh;
    overflow:hidden;
    background:black;
}

#video{
    display:none;
}

#view{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

#overlay{
    position:absolute;
    left:0;
    top:0;
    width:100%;
    height:100%;
    pointer-events:none;
}

/* ---------- VIEWFINDER ---------- */

#roi{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    width:260px;
    height:260px;
    border:2px solid rgba(255,255,255,0.15);
    border-radius:20px;
    z-index:10;
}

/* top left */

#roi::before{
    content:"";
    position:absolute;
    top:-3px;
    left:-3px;
    width:60px;
    height:60px;
    border-top:5px solid #22c55e;
    border-left:5px solid #22c55e;
    border-top-left-radius:20px;
}

/* bottom right */

#roi::after{
    content:"";
    position:absolute;
    right:-3px;
    bottom:-3px;
    width:60px;
    height:60px;
    border-right:5px solid #22c55e;
    border-bottom:5px solid #22c55e;
    border-bottom-right-radius:20px;
}

/* top right */

.corner1{
    position:absolute;
    top:-3px;
    right:-3px;
    width:60px;
    height:60px;
    border-top:5px solid #22c55e;
    border-right:5px solid #22c55e;
    border-top-right-radius:20px;
}

/* bottom left */

.corner2{
    position:absolute;
    left:-3px;
    bottom:-3px;
    width:60px;
    height:60px;
    border-left:5px solid #22c55e;
    border-bottom:5px solid #22c55e;
    border-bottom-left-radius:20px;
}

/* ---------- SCAN LINE ---------- */

#scanline{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    width:240px;
    height:3px;
    background:#22c55e;
    box-shadow:0 0 10px #22c55e;
    animation:scan 2s linear infinite;
}

@keyframes scan{

    0%{
        top:calc(50% - 120px);
    }

    50%{
        top:calc(50% + 120px);
    }

    100%{
        top:calc(50% - 120px);
    }
}

/* ---------- STATUS ---------- */

.status{
    text-align:center;
    padding:10px;
    color:#22c55e;
    font-size:16px;
}

/* ---------- RESULT ---------- */

#resultBox{
    margin:12px;
    background:#111827;
    border-radius:14px;
    padding:14px;
    display:none;
}

.resultTitle{
    color:#22d3ee;
    margin-bottom:10px;
    font-size:18px;
    font-weight:bold;
}

.resultItem{
    margin-bottom:12px;
}

.resultLabel{
    color:#94a3b8;
    font-size:13px;
}

.resultValue{
    font-size:17px;
    margin-top:3px;
    word-break:break-word;
}

/* ---------- POPUP ---------- */

#popup{
    position:fixed;
    left:50%;
    bottom:20px;
    transform:translateX(-50%);
    width:90%;
    max-width:400px;
    background:rgba(0,0,0,0.9);
    border:2px solid #22c55e;
    border-radius:14px;
    padding:14px;
    color:#22c55e;
    text-align:center;
    word-break:break-word;
    display:none;
    z-index:9999;
}

/* ---------- HISTORY ---------- */

#history{
    padding:12px;
}

.historyTitle{
    color:#22d3ee;
    margin-bottom:10px;
    font-size:18px;
    font-weight:bold;
}

.historyItem{
    background:#111827;
    border-left:4px solid #22c55e;
    padding:12px;
    border-radius:12px;
    margin-bottom:10px;
    word-break:break-word;
}

.notFound{
    color:#ef4444;
}

</style>

<script type="module">

import {
BrowserMultiFormatReader
}
from
"https://cdn.jsdelivr.net/npm/@zxing/library@0.20.0/+esm";

window.ZXING_Reader =
new BrowserMultiFormatReader();

</script>

</head>

<body>

<header>
Asset QR & Barcode Scanner
</header>

<!-- CONTROLS -->

<div class="controls">

    <select id="cameraSelect"></select>

    <div class="buttons">

        <button id="startBtn">
        Start
        </button>

        <button id="stopBtn">
        Stop
        </button>

        <button id="torchBtn">
        Torch
        </button>

        <button id="mirrorBtn">
        Mirror
        </button>

    </div>

</div>

<!-- CAMERA -->

<div id="frameWrap">

    <video id="video"
    playsinline></video>

    <canvas id="view"></canvas>

    <canvas id="overlay"></canvas>

    <div id="roi">

        <div class="corner1"></div>

        <div class="corner2"></div>

    </div>

    <div id="scanline"></div>

</div>

<!-- STATUS -->

<div class="status"
id="status">

Waiting...

</div>

<!-- RESULT -->

<div id="resultBox">

    <div class="resultTitle">
    Asset Information
    </div>

    <div class="resultItem">

        <div class="resultLabel">
        NO SIRI PENDAFTARAN
        </div>

        <div class="resultValue"
        id="resultSiri">
        -
        </div>

    </div>

    <div class="resultItem">

        <div class="resultLabel">
        KETERANGAN ASET
        </div>

        <div class="resultValue"
        id="resultAset">
        -
        </div>

    </div>

    <div class="resultItem">

        <div class="resultLabel">
        LOKASI SEMASA
        </div>

        <div class="resultValue"
        id="resultLokasi">
        -
        </div>

    </div>

</div>

<!-- HISTORY -->

<div id="history">

    <div class="historyTitle">
    Scan History
    </div>

    <div id="historyList"></div>

</div>

<!-- POPUP -->

<div id="popup"></div>

<script type="module">

/* ---------- CONFIG ---------- */

const GAS_URL =
"https://script.google.com/macros/s/AKfycbyUEjurhn07mG8zmal7W9HUwiCer_RABw503xgpR3WDSZs8SxxsssLs2roG0x96T-G5fQ/exec";

/* ---------- DOM ---------- */

const video=
document.getElementById("video");

const view=
document.getElementById("view");

const overlay=
document.getElementById("overlay");

const vctx=
view.getContext("2d");

const ctx=
overlay.getContext("2d");

const cameraSelect=
document.getElementById("cameraSelect");

const codeReader=
window.ZXING_Reader;

/* ---------- STATE ---------- */

let stream=null;

let track=null;

let vw=0;

let vh=0;

let cropY=0;

let cropH=0;

let renderRunning=false;

let decoderRunning=false;

let mirror=false;

let torch=false;

let lastText="";

let lastScanTime=0;

/* ---------- LOAD CAMERAS ---------- */

async function loadCameras(){

    const temp =
    await navigator
    .mediaDevices
    .getUserMedia({
        video:true
    });

    temp.getTracks()
    .forEach(t=>t.stop());

    const devices =
    await navigator
    .mediaDevices
    .enumerateDevices();

    const cams =
    devices.filter(d=>
    d.kind==="videoinput"
    );

    cameraSelect.innerHTML="";

    cams.forEach((cam,index)=>{

        const option =
        document
        .createElement(
        "option"
        );

        option.value =
        cam.deviceId;

        option.textContent =
        cam.label ||
        "Camera "+(index+1);

        cameraSelect
        .appendChild(
        option
        );
    });
}

/* ---------- START ---------- */

async function startScanner(){

    stopScanner();

    try{

        const selectedDeviceId =
        cameraSelect.value;

        stream =
        await navigator
        .mediaDevices
        .getUserMedia({

            video:{
                deviceId:{
                    exact:
                    selectedDeviceId
                }
            }
        });

        video.srcObject=
        stream;

        await video.play();

        track =
        stream.getVideoTracks()[0];

        vw=
        video.videoWidth;

        vh=
        video.videoHeight;

        cropY=
        Math.floor(vh/3);

        cropH=
        Math.floor(vh/3);

        view.width=vw;
        view.height=cropH;

        overlay.width=vw;
        overlay.height=cropH;

        startRender();

        startDecode(
        selectedDeviceId
        );

        document
        .getElementById(
        "status"
        ).innerHTML=
        "Scanner Started";

    }catch(err){

        alert(err);
    }
}

/* ---------- STOP ---------- */

function stopScanner(){

    decoderRunning=false;

    renderRunning=false;

    try{
        codeReader.reset();
    }catch(e){}

    if(stream){

        stream
        .getTracks()
        .forEach(t=>t.stop());

        stream=null;
    }
}

/* ---------- RENDER ---------- */

function startRender(){

    renderRunning=true;

    (function loop(){

        if(!renderRunning){
            return;
        }

        requestAnimationFrame(loop);

        vctx.save();

        if(mirror){

            vctx.translate(
            view.width,
            0
            );

            vctx.scale(-1,1);
        }

        vctx.drawImage(
            video,
            0,
            cropY,
            vw,
            cropH,
            0,
            0,
            view.width,
            view.height
        );

        vctx.restore();

    })();
}

/* ---------- MAP POINT ---------- */

function mapPoint(p){

    let x=
    p.getX
    ? p.getX()
    : p.x;

    let y=
    p.getY
    ? p.getY()
    : p.y;

    if(mirror){
        x=vw-x;
    }

    y-=cropY;

    return {x,y};
}

/* ---------- DRAW BOX ---------- */

function drawBox(points){

    ctx.clearRect(
        0,
        0,
        overlay.width,
        overlay.height
    );

    if(!points.length){
        return;
    }

    const mapped =
    points.map(mapPoint);

    let minX=999999;
    let minY=999999;
    let maxX=0;
    let maxY=0;

    mapped.forEach(p=>{

        minX=Math.min(minX,p.x);
        minY=Math.min(minY,p.y);
        maxX=Math.max(maxX,p.x);
        maxY=Math.max(maxY,p.y);
    });

    ctx.strokeStyle=
    "#22d3ee";

    ctx.lineWidth=4;

    ctx.strokeRect(
        minX-10,
        minY-10,
        (maxX-minX)+20,
        (maxY-minY)+20
    );

    setTimeout(()=>{

        ctx.clearRect(
            0,
            0,
            overlay.width,
            overlay.height
        );

    },200);
}

/* ---------- DECODE ---------- */

function startDecode(
selectedDeviceId
){

    decoderRunning=true;

    codeReader
    .decodeFromVideoDevice(

        selectedDeviceId,

        video,

        async(res)=>{

            if(
            !decoderRunning
            ){
                return;
            }

            if(res){

                const text =
                String(
                res.text || ""
                ).trim();

                const now =
                Date.now();

                if(
                    text===lastText &&
                    (now-lastScanTime)
                    < 3000
                ){
                    return;
                }

                lastText=text;

                lastScanTime=now;

                drawBox(
                res.resultPoints
                || []
                );

                beep();

                if(
                navigator.vibrate
                ){
                    navigator.vibrate(
                    [120,50,120]
                    );
                }

                await searchAsset(
                text
                );
            }
        }
    );
}

/* ---------- SEARCH DATABASE ---------- */

async function searchAsset(code){

    try{

        document
        .getElementById(
        "status"
        ).innerHTML=
        "Searching Database...";

        const response =
        await fetch(
        GAS_URL,
        {

            method:"POST",

            headers:{
                "Content-Type":
                "text/plain"
            },

            body:JSON.stringify({
                id:code
            })
        });

        const data =
        await response.json();

        if(data.found){

            document
            .getElementById(
            "status"
            ).innerHTML=
            "Asset Found";

            document
            .getElementById(
            "resultBox"
            ).style.display=
            "block";

            document
            .getElementById(
            "resultSiri"
            ).innerHTML=
            data.no_siri;

            document
            .getElementById(
            "resultAset"
            ).innerHTML=
            data.keterangan;

            document
            .getElementById(
            "resultLokasi"
            ).innerHTML=
            data.lokasi;

            addHistory(
                code,
                data.no_siri,
                data.keterangan,
                data.lokasi,
                true
            );

            showPopup(
            "Asset Found"
            );

        }else{

            document
            .getElementById(
            "status"
            ).innerHTML=
            "Asset Not Found";

            document
            .getElementById(
            "resultBox"
            ).style.display=
            "none";

            addHistory(
                code,
                "",
                "",
                "",
                false
            );

            showPopup(
            "Asset Not Found"
            );
        }

    }catch(err){

        console.log(err);

        document
        .getElementById(
        "status"
        ).innerHTML=
        "Network Error";

        showPopup(
        "Network Error"
        );
    }
}

/* ---------- HISTORY ---------- */

function addHistory(
qr,
siri,
aset,
lokasi,
found
){

    const div =
    document
    .createElement(
    "div"
    );

    div.className=
    "historyItem";

    let html =
    "<b>"+
    new Date()
    .toLocaleString()+
    "</b><br><br>";

    html +=
    "<b>QR:</b><br>"+
    qr+
    "<br><br>";

    if(found){

        html +=
        "<b>NO SIRI:</b><br>"+
        siri+
        "<br><br>";

        html +=
        "<b>ASET:</b><br>"+
        aset+
        "<br><br>";

        html +=
        "<b>LOKASI:</b><br>"+
        lokasi;

    }else{

        html +=
        "<span class='notFound'>Asset Not Found</span>";
    }

    div.innerHTML=html;

    document
    .getElementById(
    "historyList"
    )
    .prepend(div);
}

/* ---------- TORCH ---------- */

async function toggleTorch(){

    if(!track){
        return;
    }

    const caps =
    track.getCapabilities();

    if(!caps.torch){

        alert(
        "Torch not supported"
        );

        return;
    }

    torch=!torch;

    await track
    .applyConstraints({

        advanced:[{
            torch:torch
        }]
    });

    showPopup(
    torch
    ? "Torch ON"
    : "Torch OFF"
    );
}

/* ---------- MIRROR ---------- */

function toggleMirror(){

    mirror=!mirror;

    showPopup(
    mirror
    ? "Mirror ON"
    : "Mirror OFF"
    );
}

/* ---------- BEEP ---------- */

function beep(){

    const audioCtx =
    new(window.AudioContext||
    window.webkitAudioContext)();

    const osc =
    audioCtx.createOscillator();

    const gain =
    audioCtx.createGain();

    osc.connect(gain);

    gain.connect(
        audioCtx.destination
    );

    osc.frequency.value=1200;

    gain.gain.value=0.2;

    osc.start();

    setTimeout(()=>{

        osc.stop();

        audioCtx.close();

    },120);
}

/* ---------- POPUP ---------- */

function showPopup(text){

    const popup =
    document
    .getElementById(
    "popup"
    );

    popup.innerHTML=text;

    popup.style.display=
    "block";

    clearTimeout(
    popup.timer
    );

    popup.timer=
    setTimeout(()=>{

        popup.style.display=
        "none";

    },2500);
}

/* ---------- EVENTS ---------- */

document
.getElementById(
"startBtn"
)
.onclick=startScanner;

document
.getElementById(
"stopBtn"
)
.onclick=stopScanner;

document
.getElementById(
"torchBtn"
)
.onclick=toggleTorch;

document
.getElementById(
"mirrorBtn"
)
.onclick=toggleMirror;

/* ---------- INIT ---------- */

loadCameras();

</script>

</body>
</html>
