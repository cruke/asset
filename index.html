<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portable Asset Locator</title>

    <!-- Html5Qrcode Library (Optimized for Mobile) -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <style>
        :root {
            --bg: #0f172a;
            --fg: #e2e8f0;
            --accent: #22d3ee;
            --green: #22c55e;
            --red: #ef4444;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--fg);
            font-family: Arial, sans-serif;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            padding: 14px;
            font-size: 22px;
            font-weight: bold;
            color: var(--accent);
        }

        /* ---------- CONTROLS ---------- */

        .controls {
            padding: 12px;
        }

        select {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: #111827;
            color: white;
            font-size: 16px;
            margin-bottom: 10px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        button {
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: #111827;
            color: white;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }

        button:active {
            transform: scale(0.97);
        }

        /* ---------- CAMERA ---------- */

        #cameraContainer {
            position: relative;
            width: 100%;
            max-height: 220px;
            background: black;
            border-top: 2px solid #1e293b;
            border-bottom: 2px solid #1e293b;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #reader {
            width: 100%;
        }

        /* Hide Html5Qrcode built-in UI text/buttons so our custom UI controls it */
        #reader__dashboard_section, 
        #reader__status_span,
        #reader__scan_region img {
            display: none !important;
        }

        #reader video {
            width: 100% !important;
            height: auto !important;
            display: block;
        }

        /* ---------- STATUS ---------- */

        .status {
            text-align: center;
            padding: 12px;
            color: #22c55e;
            font-weight: bold;
            word-break: break-word;
        }

        /* ---------- RESULT ---------- */

        #resultBox {
            margin: 12px;
            background: #111827;
            border-radius: 14px;
            padding: 14px;
            display: none;
        }

        .resultTitle {
            color: #22d3ee;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .resultItem {
            margin-bottom: 12px;
        }

        .resultLabel {
            color: #94a3b8;
            font-size: 13px;
        }

        .resultValue {
            margin-top: 3px;
            font-size: 17px;
            word-break: break-word;
        }

        /* ---------- HISTORY ---------- */

        #history {
            padding: 12px;
        }

        .historyItem {
            background: #111827;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 10px;
            border-left: 4px solid #22c55e;
            word-break: break-word;
        }

        /* ---------- POPUP ---------- */

        #popup {
            position: fixed;
            left: 50%;
            bottom: 20px;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: rgba(0,0,0,0.92);
            border: 2px solid #22c55e;
            border-radius: 14px;
            padding: 14px;
            color: #22c55e;
            text-align: center;
            display: none;
            z-index: 9999;
        }
    </style>
</head>
<body>

<header>
    Portable Asset Locator
</header>

<!-- CONTROLS -->
<div class="controls">
    <select id="cameraSelect">
        <option value="">Select Camera...</option>
    </select>

    <div class="buttons">
        <button id="startBtn">Start</button>
        <button id="stopBtn">Stop</button>
        <button id="torchBtn">Torch</button>
        <button id="mirrorBtn">Mirror</button>
    </div>
</div>

<!-- CAMERA SCANNER CONTAINER -->
<div id="cameraContainer">
    <div id="reader"></div>
</div>

<!-- STATUS -->
<div class="status" id="status">Tap Start to begin</div>

<!-- RESULT -->
<div id="resultBox">
    <div class="resultTitle">Asset Information</div>

    <div class="resultItem">
        <div class="resultLabel">NO SIRI PENDAFTARAN</div>
        <div class="resultValue" id="resultSiri">-</div>
    </div>

    <div class="resultItem">
        <div class="resultLabel">KETERANGAN ASET</div>
        <div class="resultValue" id="resultAset">-</div>
    </div>

    <div class="resultItem">
        <div class="resultLabel">LOKASI SEMASA</div>
        <div class="resultValue" id="resultLokasi">-</div>
    </div>
</div>

<!-- HISTORY -->
<div id="history">
    <h3>Scan History</h3>
    <div id="historyList"></div>
</div>

<!-- POPUP -->
<div id="popup"></div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbyUEjurhn07mG8zmal7W9HUwiCer_RABw503xgpR3WDSZs8SxxsssLs2roG0x96T-G5fQ/exec";

const statusLabel = document.getElementById("status");
const popup = document.getElementById("popup");
const cameraSelect = document.getElementById("cameraSelect");

let html5QrCode = null;
let isScanning = false;
let mirror = false;
let recentScans = {};

/* ---------- INITIALIZE CAMERAS ---------- */

async function loadCameras() {
    try {
        const devices = await Html5Qrcode.getCameras();
        cameraSelect.innerHTML = "";

        if (devices && devices.length > 0) {
            devices.forEach((cam, index) => {
                const option = document.createElement("option");
                option.value = cam.id;
                option.textContent = cam.label || `Camera ${index + 1}`;
                cameraSelect.appendChild(option);
            });

            // Default to back camera
            const backCam = devices.find(c => 
                c.label.toLowerCase().includes("back") || 
                c.label.toLowerCase().includes("environment") ||
                c.label.toLowerCase().includes("rear")
            );

            if (backCam) {
                cameraSelect.value = backCam.id;
            }

            statusLabel.style.color = "#22c55e";
            statusLabel.innerHTML = "Camera Ready. Press Start.";
        } else {
            statusLabel.style.color = "#ef4444";
            statusLabel.innerHTML = "No cameras found.";
        }
    } catch (err) {
        console.error("Camera listing error:", err);
        statusLabel.style.color = "#ef4444";
        statusLabel.innerHTML = "Tap Start to allow camera access.";
    }
}

/* ---------- START SCANNER ---------- */

async function startScanner() {
    if (isScanning) await stopScanner();

    // Enable native hardware acceleration for faster 1D scanning on long codes
    if (!html5QrCode) {
        html5QrCode = new Html5Qrcode("reader", {
            experimentalFeatures: {
                useBarCodeDetectorIfSupported: true
            }
        });
    }

    let cameraId = cameraSelect.value;
    
    // Request higher resolutions so thin barcode lines remain visible to the reader
    let cameraConfig = cameraId ? 
        { deviceId: { exact: cameraId } } : 
        { 
            facingMode: "environment",
            width: { min: 1280, ideal: 1920 },
            height: { min: 720, ideal: 1080 }
        };

    statusLabel.style.color = "#22c55e";
    statusLabel.innerHTML = "Starting camera...";

    const scanConfig = {
        fps: 15,
        aspectRatio: 2.2,
        // Wide scan target region tailored for long 14+ character Code 128 barcodes
        qrbox: { width: 350, height: 110 },
        formatsToSupport: [
            Html5QrcodeSupportedFormats.CODE_128,
            Html5QrcodeSupportedFormats.CODE_39,
            Html5QrcodeSupportedFormats.EAN_13,
            Html5QrcodeSupportedFormats.UPC_A,
            Html5QrcodeSupportedFormats.QR_CODE
        ]
    };

    try {
        await html5QrCode.start(
            cameraConfig,
            scanConfig,
            (decodedText, decodedResult) => {
                handleScan(decodedText);
            },
            (errorMessage) => {
                // Ignore frame decode errors
            }
        );

        isScanning = true;
        statusLabel.innerHTML = "Scanning...";

        if (cameraSelect.options.length <= 1) {
            loadCameras();
        }

    } catch (err) {
        console.error("Start Error:", err);
        statusLabel.style.color = "#ef4444";
        statusLabel.innerHTML = `Camera Error: ${err.message || err}`;
    }
}

/* ---------- STOP SCANNER ---------- */

async function stopScanner() {
    if (html5QrCode && isScanning) {
        try {
            await html5QrCode.stop();
            isScanning = false;
        } catch (e) {
            console.error(e);
        }
    }
    statusLabel.style.color = "#22c55e";
    statusLabel.innerHTML = "Scanner Stopped";
}

/* ---------- HANDLE SCAN ---------- */

async function handleScan(text) {
    const now = Date.now();

    // Prevent duplicate triggers within 4 seconds
    if (recentScans[text] && (now - recentScans[text] < 4000)) {
        return;
    }

    recentScans[text] = now;
    beep();

    if (navigator.vibrate) {
        navigator.vibrate([120, 50, 120]);
    }

    await searchAsset(text);
}

/* ---------- SEARCH DATABASE ---------- */

async function searchAsset(code) {
    try {
        statusLabel.innerHTML = `Found Code: ${code}`;

        const response = await fetch(GAS_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain" },
            body: JSON.stringify({ id: code })
        });

        const data = await response.json();

        if (data.found) {
            statusLabel.innerHTML = "Asset Found";
            document.getElementById("resultBox").style.display = "block";
            document.getElementById("resultSiri").innerHTML = data.no_siri || "-";
            document.getElementById("resultAset").innerHTML = data.keterangan || "-";
            document.getElementById("resultLokasi").innerHTML = data.lokasi || "-";

            addHistory(code, data.no_siri, data.keterangan, data.lokasi, true);
            showPopup("Asset Found");
        } else {
            statusLabel.innerHTML = "Asset Not Found";
            document.getElementById("resultBox").style.display = "none";

            addHistory(code, "", "", "", false);
            showPopup("Asset Not Found");
        }

    } catch (err) {
        console.error("Fetch Error:", err);
        statusLabel.style.color = "#ef4444";
        statusLabel.innerHTML = "Network Error";
        showPopup("Network Error");
    }
}

/* ---------- UTILITY FUNCTIONS ---------- */

function addHistory(qr, siri, aset, lokasi, found) {
    const div = document.createElement("div");
    div.className = "historyItem";

    let html = `<b>${new Date().toLocaleTimeString()}</b><br>`;
    html += `<b>Code:</b> ${qr}<br><br>`;

    if (found) {
        html += `<b>NO SIRI:</b> ${siri}<br>`;
        html += `<b>ASET:</b> ${aset}<br>`;
        html += `<b>LOKASI:</b> ${lokasi}`;
    } else {
        html += `<span style="color:#ef4444">Asset Not Found</span>`;
    }

    div.innerHTML = html;
    document.getElementById("historyList").prepend(div);
}

function toggleTorch() {
    showPopup("Torch toggle controlled by device hardware settings");
}

function toggleMirror() {
    mirror = !mirror;
    const video = document.querySelector("#reader video");
    if (video) {
        video.style.transform = mirror ? "scaleX(-1)" : "scaleX(1)";
    }
    showPopup(mirror ? "Mirror ON" : "Mirror OFF");
}

function beep() {
    try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.frequency.value = 1200;
        gain.gain.value = 0.2;

        osc.start();
        setTimeout(() => {
            osc.stop();
            audioCtx.close();
        }, 120);
    } catch (e) {}
}

function showPopup(text) {
    popup.innerHTML = text;
    popup.style.display = "block";
    clearTimeout(popup.timer);
    popup.timer = setTimeout(() => {
        popup.style.display = "none";
    }, 2500);
}

/* ---------- BIND EVENTS ---------- */

document.getElementById("startBtn").onclick = startScanner;
document.getElementById("stopBtn").onclick = stopScanner;
document.getElementById("torchBtn").onclick = toggleTorch;
document.getElementById("mirrorBtn").onclick = toggleMirror;

// Initialize camera list on load
loadCameras();
</script>

</body>
</html>
