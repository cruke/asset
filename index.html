<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portable Asset Locator</title>

    <!-- Html5Qrcode Library (Optimized for Mobile) -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <style>
        :root {
            --bg: #0f172a;
            --fg: #e2e8f0;
            --accent: #22d3ee;
            --green: #22c55e;
            --red: #ef4444;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--fg);
            font-family: Arial, sans-serif;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            padding: 16px;
            font-size: 22px; 
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            
            /* --- REKAAN TAJUK EMAS DENGAN GLOW TENGAH --- */
            color: #FFD700; 
            -webkit-text-stroke: 1px #000000; 
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8), 0 0 20px rgba(255, 255, 255, 0.5); 
        }

        .logo-container {
            width: 55px;
            height: 55px;
            display: inline-block;
            border-radius: 14px;
            /* --- GLOW PUTIH PADA KONTENA LOGO --- */
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.7), inset 0 0 10px rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.5);
            background: #0f172a;
            overflow: hidden;
        }

        /* ---------- CONTROLS ---------- */

        .controls {
            padding: 12px;
        }

        select {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: #111827;
            color: white;
            font-size: 16px;
            margin-bottom: 10px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        button {
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: #111827;
            color: white;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }

        button:active {
            transform: scale(0.97);
        }

        /* ---------- CAMERA ---------- */

        #cameraContainer {
            position: relative;
            width: 100%;
            max-height: 220px;
            background: black;
            border-top: 2px solid #1e293b;
            border-bottom: 2px solid #1e293b;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #reader {
            width: 100%;
        }

        #reader__dashboard_section, 
        #reader__status_span,
        #reader__scan_region img {
            display: none !important;
        }

        #reader video {
            width: 100% !important;
            height: auto !important;
            display: block;
        }

        /* ---------- STATUS ---------- */

        .status {
            text-align: center;
            padding: 12px;
            color: #22c55e;
            font-weight: bold;
            word-break: break-word;
        }

        /* ---------- RESULT ---------- */

        #resultBox {
            margin: 12px;
            background: #111827;
            border-radius: 14px;
            padding: 14px;
            display: none;
        }

        .resultTitle {
            color: #22d3ee;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .resultItem {
            margin-bottom: 12px;
        }

        .resultLabel {
            color: #94a3b8;
            font-size: 13px;
        }

        .resultValue {
            margin-top: 3px;
            font-size: 17px;
            word-break: break-word;
        }

        /* ---------- HISTORY ---------- */

        #history {
            padding: 12px;
        }

        .historyItem {
            background: #111827;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 10px;
            border-left: 4px solid #22c55e;
            word-break: break-word;
        }

        /* ---------- POPUP ---------- */

        #popup {
            position: fixed;
            left: 50%;
            bottom: 20px;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: rgba(0,0,0,0.92);
            border: 2px solid #22c55e;
            border-radius: 14px;
            padding: 14px;
            color: #22c55e;
            text-align: center;
            display: none;
            z-index: 9999;
        }
    </style>
</head>
<body>

<header>
    <!-- Logo SVG dengan bentuk L 4 unit berwarna hijau -->
    <div class="logo-container">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
          <defs>
            <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#FFE066" />
              <stop offset="50%" stop-color="#FFD700" />
              <stop offset="100%" stop-color="#CCA600" />
            </linearGradient>
            <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#0f172a" />
              <stop offset="100%" stop-color="#1e293b" />
            </linearGradient>
          </defs>
          <rect width="500" height="500" rx="100" fill="url(#bgGradient)" />
          
          <!-- 4 unit bentuk L berwarna hijau (#22c55e) -->
          <g stroke="#22c55e" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path d="M 90 140 L 90 90 L 140 90" />
            <path d="M 410 140 L 410 90 L 360 90" />
            <path d="M 90 360 L 90 410 L 140 410" />
            <path d="M 410 360 L 410 410 L 360 410" />
          </g>

          <g transform="translate(150, 150)">
            <path d="M 100 40 L 170 80 L 100 120 L 30 80 Z" fill="url(#goldGradient)" opacity="0.9" />
            <path d="M 30 90 L 100 130 L 100 200 L 30 160 Z" fill="#D4AF37" opacity="0.8" />
            <path d="M 170 90 L 100 130 L 100 200 L 170 160 Z" fill="#FFD700" opacity="0.9" />
            <rect x="85" y="110" width="6" height="30" fill="#0f172a" />
            <rect x="95" y="105" width="4" height="35" fill="#0f172a" />
            <rect x="103" y="108" width="8" height="32" fill="#0f172a" />
            <rect x="115" y="112" width="5" height="28" fill="#0f172a" />
          </g>
          <line x1="70" y1="250" x2="430" y2="250" stroke="#22d3ee" stroke-width="6" stroke-linecap="round" />
          <line x1="120" y1="250" x2="380" y2="250" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
        </svg>
    </div>
    Portable Asset Locator
</header>

<!-- CONTROLS -->
<div class="controls">
    <select id="cameraSelect">
        <option value="">Select Camera...</option>
    </select>

    <div class="buttons">
        <button id="startBtn">Start</button>
        <button id="stopBtn">Stop</button>
        <button id="torchBtn">Torch</button>
        <button id="mirrorBtn">Mirror</button>
    </div>
</div>

<!-- CAMERA SCANNER CONTAINER -->
<div id="cameraContainer">
    <div id="reader"></div>
</div>

<!-- STATUS -->
<div class="status" id="status">Tap Start to begin</div>

<!-- RESULT -->
<div id="resultBox">
    <div class="resultTitle">Asset Information</div>

    <div class="resultItem">
        <div class="resultLabel">NO SIRI PENDAFTARAN</div>
        <div class="resultValue" id="resultSiri">-</div>
    </div>

    <div class="resultItem">
        <div class="resultLabel">KETERANGAN ASET</div>
        <div class="resultValue" id="resultAset">-</div>
    </div>

    <div class="resultItem">
        <div class="resultLabel">LOKASI SEMASA</div>
        <div class="resultValue" id="resultLokasi">-</div>
    </div>
</div>

<!-- HISTORY -->
<div id="history">
    <h3>Scan History</h3>
    <div id="historyList"></div>
</div>

<!-- POPUP -->
<div id="popup"></div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbyUEjurhn07mG8zmal7W9HUwiCer_RABw503xgpR3WDSZs8SxxsssLs2roG0x96T-G5fQ/exec";

const statusLabel = document.getElementById("status");
const popup = document.getElementById("popup");
const cameraSelect = document.getElementById("cameraSelect");

let html5QrCode = null;
let isScanning = false;
let mirror = false;
let recentScans = {};
let torchOn = false;

/* ---------- INITIALIZE CAMERAS ---------- */

async function loadCameras() {
    try {
        const devices = await Html5Qrcode.getCameras();
        cameraSelect.innerHTML = "";

        if (devices && devices.length > 0) {
            devices.forEach((cam, index) => {
                const option = document.createElement("option");
                option.value = cam.id;
                option.textContent = cam.label || `Camera ${index + 1}`;
                cameraSelect.appendChild(option);
            });

            const backCam = devices.find(c => 
                c.label.toLowerCase().includes("back") || 
                c.label.toLowerCase().includes("environment") ||
                c.label.toLowerCase().includes("rear")
            );

            if (backCam) {
                cameraSelect.value = backCam.id;
            }

            statusLabel.style.color = "#22c55e";
            statusLabel.innerHTML = "Camera Ready. Press Start.";
        } else {
            statusLabel.style.color = "#ef4444";
            statusLabel.innerHTML = "No cameras found.";
        }
    } catch (err) {
        console.error("Camera listing error:", err);
        statusLabel.style.color = "#ef4444";
        statusLabel.innerHTML = "Tap Start to allow camera access.";
    }
}

/* ---------- START SCANNER ---------- */

async function startScanner() {
    if (isScanning) await stopScanner();
    torchOn = false;

    if (!html5QrCode) {
        html5QrCode = new Html5Qrcode("reader", {
            experimentalFeatures: {
                useBarCodeDetectorIfSupported: true
            }
        });
    }

    let cameraId = cameraSelect.value;
    
    let cameraConfig = cameraId ? 
        { deviceId: { exact: cameraId } } : 
        { 
            facingMode: "environment",
            width: { min: 1280, ideal: 1920 },
            height: { min: 720, ideal: 1080 }
        };

    statusLabel.style.color = "#22c55e";
    statusLabel.innerHTML = "Starting camera...";

    const scanConfig = {
        fps: 15,
        aspectRatio: 2.2,
        qrbox: { width: 350, height: 110 },
        formatsToSupport: [
            Html5QrcodeSupportedFormats.CODE_128,
            Html5QrcodeSupportedFormats.CODE_39,
            Html5QrcodeSupportedFormats.EAN_13,
            Html5QrcodeSupportedFormats.UPC_A,
            Html5QrcodeSupportedFormats.QR_CODE
        ]
    };

    try {
        await html5QrCode.start(
            cameraConfig,
            scanConfig,
            (decodedText, decodedResult) => {
                handleScan(decodedText);
            },
            (errorMessage) => {}
        );

        isScanning = true;
        statusLabel.innerHTML = "Scanning...";

        if (cameraSelect.options.length <= 1) {
            loadCameras();
        }

    } catch (err) {
        console.error("Start Error:", err);
        statusLabel.style.color = "#ef4444";
        statusLabel.innerHTML = `Camera Error: ${err.message || err}`;
    }
}

/* ---------- STOP SCANNER ---------- */

async function stopScanner() {
    if (html5QrCode && isScanning) {
        try {
            await html5QrCode.stop();
            isScanning = false;
            torchOn = false;
        } catch (e) {
            console.error(e);
        }
    }
    statusLabel.style.color = "#22c55e";
    statusLabel.innerHTML = "Scanner Stopped";
}

/* ---------- HANDLE SCAN ---------- */

async function handleScan(text) {
    const now = Date.now();

    if (recentScans[text] && (now - recentScans[text] < 4000)) {
        return;
    }

    recentScans[text] = now;
    beep();

    if (navigator.vibrate) {
        navigator.vibrate([120, 50, 120]);
    }

    await searchAsset(text);
}

/* ---------- SEARCH DATABASE ---------- */

async function searchAsset(code) {
    try {
        statusLabel.innerHTML = `Found Code: ${code}`;

        const response = await fetch(GAS_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain" },
            body: JSON.stringify({ id: code })
        });

        const data = await response.json();

        if (data.found) {
            statusLabel.innerHTML = "Asset Found";
            document.getElementById("resultBox").style.display = "block";
            document.getElementById("resultSiri").innerHTML = data.no_siri || "-";
            document.getElementById("resultAset").innerHTML = data.keterangan || "-";
            document.getElementById("resultLokasi").innerHTML = data.lokasi || "-";

            addHistory(code, data.no_siri, data.keterangan, data.lokasi, true);
            showPopup("Asset Found");
        } else {
            statusLabel.innerHTML = "Asset Not Found";
            document.getElementById("resultBox").style.display = "none";

            addHistory(code, "", "", "", false);
            showPopup("Asset Not Found");
        }

    } catch (err) {
        console.error("Fetch Error:", err);
        statusLabel.style.color = "#ef4444";
        statusLabel.innerHTML = "Network Error";
        showPopup("Network Error");
    }
}

/* ---------- UTILITY FUNCTIONS ---------- */

function addHistory(qr, siri, aset, lokasi, found) {
    const div = document.createElement("div");
    div.className = "historyItem";

    let html = `<b>${new Date().toLocaleTimeString()}</b><br>`;
    html += `<b>Code:</b> ${qr}<br><br>`;

    if (found) {
        html += `<b>NO SIRI:</b> ${siri}<br>`;
        html += `<b>ASET:</b> ${aset}<br>`;
        html += `<b>LOKASI:</b> ${lokasi}`;
    } else {
        html += `<span style="color:#ef4444">Asset Not Found</span>`;
    }

    div.innerHTML = html;
    document.getElementById("historyList").prepend(div);
}

async function toggleTorch() {
    if (!isScanning) {
        showPopup("Sila tekan Start untuk buka kamera dahulu");
        return;
    }

    try {
        const videoElement = document.querySelector("#reader video");
        if (!videoElement || !videoElement.srcObject) {
            showPopup("Video stream tidak ditemui");
            return;
        }

        const track = videoElement.srcObject.getVideoTracks()[0];
        const capabilities = track.getCapabilities();

        if (capabilities.torch) {
            torchOn = !torchOn;
            await track.applyConstraints({
                advanced: [{ torch: torchOn }]
            });
            showPopup(torchOn ? "Torch ON" : "Torch OFF");
        } else {
            showPopup("Flash web tidak disokong pada peranti/pelayar ini");
        }
    } catch (err) {
        console.error("Ralat Torch:", err);
        showPopup("Gagal menghidupkan Flash. Mungkin disekat oleh OS");
    }
}

function toggleMirror() {
    mirror = !mirror;
    const video = document.querySelector("#reader video");
    if (video) {
        video.style.transform = mirror ? "scaleX(-1)" : "scaleX(1)";
    }
    showPopup(mirror ? "Mirror ON" : "Mirror OFF");
}

function beep() {
    try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.frequency.value = 1200;
        gain.gain.value = 0.2;

        osc.start();
        setTimeout(() => {
            osc.stop();
            audioCtx.close();
        }, 120);
    } catch (e) {}
}

function showPopup(text) {
    popup.innerHTML = text;
    popup.style.display = "block";
    clearTimeout(popup.timer);
    popup.timer = setTimeout(() => {
        popup.style.display = "none";
    }, 2500);

    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US'; 
        window.speechSynthesis.speak(utterance);
    }
}

function playWelcomeMessage() {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance("Welcome to Portable Asset Locator. System is ready.");
        utterance.lang = 'en-US';
        window.speechSynthesis.speak(utterance);
    }
}

/* ---------- BIND EVENTS ---------- */

document.getElementById("startBtn").onclick = startScanner;
document.getElementById("stopBtn").onclick = stopScanner;
document.getElementById("torchBtn").onclick = toggleTorch;
document.getElementById("mirrorBtn").onclick = toggleMirror;

window.addEventListener("load", () => {
    loadCameras();
    playWelcomeMessage(); 
});

let firstTouch = false;
document.body.addEventListener('click', () => {
    if (!firstTouch) {
        firstTouch = true;
        playWelcomeMessage();
    }
}, { once: true });

</script>

</body>
</html>
